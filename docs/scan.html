<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リダイレクト中... - FURIRA</title>
<script>
// scan.html → product.html に統合済み
// 旧URLやQRコードからのアクセスをSPA product pageにリダイレクト
(function() {
  var params = new URLSearchParams(window.location.search);
  var invId = params.get('inv');
  if (invId) {
    sessionStorage.setItem('pendingInvSlotId', invId);
  }
  window.location.replace('/?page=product');
})();
</script>
</head>
<body>
<p style="text-align:center;margin-top:40px;color:#666;">リダイレクト中...</p>
</body>
</html>
