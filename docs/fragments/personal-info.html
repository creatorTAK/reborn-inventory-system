  <script>
  (function() {
    var db = window.firebaseDB;
    var doc = window.firestoreDoc;
    var getDoc = window.firestoreGetDoc;
    var updateDoc = window.firestoreUpdateDoc;

    var _pinfoData = {
      shipping: { lastName: '', firstName: '', postalCode: '', prefecture: '', city: '', street: '', building: '', phone: '' },
      bank: { bankCode: '', bankName: '', branchCode: '', branchName: '', accountType: '', accountNumber: '', accountHolder: '' }
    };
    var _pinfoBankCache = null;
    var _pinfoBranchCache = {};
    var _pinfoSelectedBank = null;  // { code, name }
    var _pinfoSelectedBranch = null; // { code, name }

    // ========================================
    // 初期化・破棄
    // ========================================

    async function initPersonalInfoPage() {
      var userEmail = localStorage.getItem('reborn_user_email');
      if (!userEmail || !db) return;

      await _pinfoLoadData(userEmail);
      _pinfoPopulateForm();
      _pinfoSetupListeners();
      _pinfoFetchBankData(); // プリロード
    }

    function destroyPersonalInfoPage() {
      _pinfoData = {
        shipping: { lastName: '', firstName: '', postalCode: '', prefecture: '', city: '', street: '', building: '', phone: '' },
        bank: { bankCode: '', bankName: '', branchCode: '', branchName: '', accountType: '', accountNumber: '', accountHolder: '' }
      };
      _pinfoSelectedBank = null;
      _pinfoSelectedBranch = null;
      document.removeEventListener('click', _pinfoCloseDropdowns);
    }

    // ========================================
    // データ読み込み
    // ========================================

    async function _pinfoLoadData(email) {
      try {
        var userRef = doc(db, 'users', email);
        var userSnap = await getDoc(userRef);
        if (userSnap.exists()) {
          var data = userSnap.data();
          if (data.personalInfo) {
            var sh = data.personalInfo.shipping || {};
            _pinfoData = {
              shipping: {
                lastName: sh.lastName || '',
                firstName: sh.firstName || '',
                name: sh.name || '',
                postalCode: sh.postalCode || '',
                prefecture: sh.prefecture || '',
                city: sh.city || '',
                street: sh.street || '',
                building: sh.building || '',
                phone: sh.phone || '',
                address: sh.address || ''
              },
              bank: data.personalInfo.bank || { bankCode: '', bankName: '', branchCode: '', branchName: '', accountType: '', accountNumber: '', accountHolder: '' }
            };
          }
        }
      } catch (error) {
        console.error('[PersonalInfo] 読み込みエラー:', error);
      }
    }

    function _pinfoPopulateForm() {
      // 発送先 - 姓名
      var ln = _pinfoData.shipping.lastName || '';
      var fn = _pinfoData.shipping.firstName || '';
      // 旧データ互換: nameしかない場合はスペースで分割
      if (!ln && !fn && _pinfoData.shipping.name) {
        var parts = _pinfoData.shipping.name.trim().split(/\s+/);
        ln = parts[0] || '';
        fn = parts.slice(1).join(' ') || '';
      }
      document.getElementById('pinfo-lastName').value = ln;
      document.getElementById('pinfo-firstName').value = fn;
      document.getElementById('pinfo-postalCode').value = _pinfoData.shipping.postalCode || '';
      document.getElementById('pinfo-prefecture').value = _pinfoData.shipping.prefecture || '';
      document.getElementById('pinfo-city').value = _pinfoData.shipping.city || '';
      document.getElementById('pinfo-street').value = _pinfoData.shipping.street || '';
      document.getElementById('pinfo-building').value = _pinfoData.shipping.building || '';
      document.getElementById('pinfo-phone').value = _pinfoData.shipping.phone || '';

      // 旧データ互換: addressフィールドしかない場合はcityに入れる
      if (!_pinfoData.shipping.prefecture && !_pinfoData.shipping.city && _pinfoData.shipping.address) {
        document.getElementById('pinfo-city').value = _pinfoData.shipping.address;
      }

      // 口座
      document.getElementById('pinfo-accountType').value = _pinfoData.bank.accountType || 'ordinary';
      document.getElementById('pinfo-accountNumber').value = _pinfoData.bank.accountNumber || '';
      document.getElementById('pinfo-accountHolder').value = _pinfoData.bank.accountHolder || '';

      // 銀行選択状態の復元
      var bankCode = _pinfoData.bank.bankCode || '';
      var bankName = _pinfoData.bank.bankName || '';
      if (bankCode && bankName) {
        _pinfoSelectBank(bankCode, bankName);
      }

      // 支店選択状態の復元
      var branchCode = _pinfoData.bank.branchCode || '';
      var branchName = _pinfoData.bank.branchName || '';
      if (branchCode && branchName) {
        _pinfoSelectBranch(branchCode, branchName);
      }
    }

    function _pinfoSetupListeners() {
      var bankInput = document.getElementById('pinfo-bankSearch');
      var branchInput = document.getElementById('pinfo-branchSearch');
      var _bankTimer = null;
      var _branchTimer = null;

      bankInput.addEventListener('input', function() {
        clearTimeout(_bankTimer);
        _bankTimer = setTimeout(function() { _pinfoSearchBanks(bankInput.value); }, 200);
      });
      bankInput.addEventListener('focus', function() {
        if (bankInput.value.length > 0) _pinfoSearchBanks(bankInput.value);
      });

      branchInput.addEventListener('input', function() {
        clearTimeout(_branchTimer);
        _branchTimer = setTimeout(function() { _pinfoSearchBranches(branchInput.value); }, 200);
      });
      branchInput.addEventListener('focus', function() {
        if (branchInput.value.length > 0) _pinfoSearchBranches(branchInput.value);
        else if (_pinfoSelectedBank) _pinfoSearchBranches('');
      });

      // 電話番号自動ハイフン
      document.getElementById('pinfo-phone').addEventListener('input', _pinfoFormatPhone);

      document.addEventListener('click', _pinfoCloseDropdowns);
    }

    function _pinfoFormatPhone(e) {
      var input = e.target;
      var digits = input.value.replace(/[^0-9]/g, '');
      var formatted = '';
      if (digits.length <= 3) {
        formatted = digits;
      } else if (digits.length <= 7) {
        formatted = digits.substring(0, 3) + '-' + digits.substring(3);
      } else {
        formatted = digits.substring(0, 3) + '-' + digits.substring(3, 7) + '-' + digits.substring(7, 11);
      }
      input.value = formatted;
    }

    function _pinfoCloseDropdowns(e) {
      var bankWrap = document.getElementById('pinfo-bankSearchWrap');
      var branchWrap = document.getElementById('pinfo-branchSearchWrap');
      if (bankWrap && !bankWrap.contains(e.target)) {
        document.getElementById('pinfo-bankResults').classList.remove('show');
      }
      if (branchWrap && !branchWrap.contains(e.target)) {
        document.getElementById('pinfo-branchResults').classList.remove('show');
      }
    }

    // ========================================
    // 銀行データAPI
    // ========================================

    async function _pinfoFetchBankData() {
      if (_pinfoBankCache) return _pinfoBankCache;
      try {
        var response = await fetch('https://zengin-code.github.io/api/banks.json');
        if (!response.ok) throw new Error('Failed to fetch bank data');
        _pinfoBankCache = await response.json();
        return _pinfoBankCache;
      } catch (error) {
        console.error('[BankCode] 銀行データ取得エラー:', error);
        return null;
      }
    }

    async function _pinfoFetchBranchData(bankCode) {
      if (_pinfoBranchCache[bankCode]) return _pinfoBranchCache[bankCode];
      try {
        var response = await fetch('https://morix1500.github.io/zengin/data/branches/' + bankCode + '.json');
        if (!response.ok) throw new Error('Failed to fetch branch data');
        var branches = await response.json();
        _pinfoBranchCache[bankCode] = branches;
        return branches;
      } catch (error) {
        console.error('[BankCode] 支店データ取得エラー:', error);
        return null;
      }
    }

    // ========================================
    // 銀行名検索
    // ========================================

    async function _pinfoSearchBanks(query) {
      var resultsEl = document.getElementById('pinfo-bankResults');
      var q = query.trim();

      if (q.length === 0) {
        resultsEl.classList.remove('show');
        return;
      }

      resultsEl.innerHTML = '<div class="pinfo-search-loading">検索中...</div>';
      resultsEl.classList.add('show');

      var data = await _pinfoFetchBankData();
      if (!data) {
        resultsEl.innerHTML = '<div class="pinfo-search-empty">データ取得に失敗しました</div>';
        return;
      }

      var matches = [];
      var keys = Object.keys(data);
      for (var i = 0; i < keys.length; i++) {
        var bank = data[keys[i]];
        var name = bank.name || '';
        var kana = bank.kana || '';
        var hira = bank.hira || '';
        if (name.indexOf(q) !== -1 || kana.indexOf(q) !== -1 || hira.indexOf(q) !== -1 ||
            name.toLowerCase().indexOf(q.toLowerCase()) !== -1) {
          matches.push({ code: keys[i], name: name });
        }
        if (matches.length >= 20) break;
      }

      if (matches.length === 0) {
        resultsEl.innerHTML = '<div class="pinfo-search-empty">該当する金融機関がありません</div>';
        return;
      }

      var html = '';
      for (var j = 0; j < matches.length; j++) {
        html += '<div class="pinfo-search-item" data-code="' + matches[j].code + '" data-name="' + matches[j].name + '">'
          + '<span class="pinfo-search-item-name">' + matches[j].name + '</span>'
          + '<span class="pinfo-search-item-code">' + matches[j].code + '</span></div>';
      }
      resultsEl.innerHTML = html;

      var items = resultsEl.querySelectorAll('.pinfo-search-item');
      for (var k = 0; k < items.length; k++) {
        items[k].addEventListener('click', function() {
          _pinfoSelectBank(this.dataset.code, this.dataset.name);
          resultsEl.classList.remove('show');
        });
      }
    }

    function _pinfoSelectBank(code, name) {
      _pinfoSelectedBank = { code: code, name: name };

      // 検索入力を隠してチップ表示
      document.getElementById('pinfo-bankSearch').value = '';
      document.getElementById('pinfo-bankSearchWrap').style.display = 'none';
      document.getElementById('pinfo-bankResults').classList.remove('show');
      var chip = document.getElementById('pinfo-bankChip');
      chip.classList.add('show');
      document.getElementById('pinfo-bankChipName').textContent = name;
      document.getElementById('pinfo-bankChipCode').textContent = '金融機関コード: ' + code;

      // 支店をリセット＆有効化
      _pinfoClearBranchInternal();
      var branchInput = document.getElementById('pinfo-branchSearch');
      branchInput.disabled = false;
      branchInput.placeholder = '支店名を入力（例: 東京）';

      // 支店データをプリロード
      _pinfoFetchBranchData(code);
    }

    function pinfoClearBank() {
      _pinfoSelectedBank = null;
      document.getElementById('pinfo-bankSearchWrap').style.display = '';
      document.getElementById('pinfo-bankSearch').value = '';
      document.getElementById('pinfo-bankChip').classList.remove('show');

      // 支店もクリア
      _pinfoClearBranchInternal();
      document.getElementById('pinfo-branchSearch').disabled = true;
      document.getElementById('pinfo-branchSearch').placeholder = '先に金融機関を選択してください';
    }

    // ========================================
    // 支店名検索
    // ========================================

    async function _pinfoSearchBranches(query) {
      var resultsEl = document.getElementById('pinfo-branchResults');
      if (!_pinfoSelectedBank) return;

      resultsEl.innerHTML = '<div class="pinfo-search-loading">検索中...</div>';
      resultsEl.classList.add('show');

      var branches = await _pinfoFetchBranchData(_pinfoSelectedBank.code);
      if (!branches) {
        resultsEl.innerHTML = '<div class="pinfo-search-empty">支店データ取得に失敗しました</div>';
        return;
      }

      var q = query.trim();
      var matches = [];
      for (var i = 0; i < branches.length; i++) {
        var b = branches[i];
        var bName = b.name || '';
        var bKana = b.kana || '';
        if (q.length === 0 || bName.indexOf(q) !== -1 || bKana.indexOf(q) !== -1) {
          matches.push({ code: b.code, name: bName });
        }
        if (matches.length >= 30) break;
      }

      if (matches.length === 0) {
        resultsEl.innerHTML = '<div class="pinfo-search-empty">該当する支店がありません</div>';
        return;
      }

      var html = '';
      for (var j = 0; j < matches.length; j++) {
        html += '<div class="pinfo-search-item" data-code="' + matches[j].code + '" data-name="' + matches[j].name + '">'
          + '<span class="pinfo-search-item-name">' + matches[j].name + '</span>'
          + '<span class="pinfo-search-item-code">' + matches[j].code + '</span></div>';
      }
      resultsEl.innerHTML = html;

      var items = resultsEl.querySelectorAll('.pinfo-search-item');
      for (var k = 0; k < items.length; k++) {
        items[k].addEventListener('click', function() {
          _pinfoSelectBranch(this.dataset.code, this.dataset.name);
          resultsEl.classList.remove('show');
        });
      }
    }

    function _pinfoSelectBranch(code, name) {
      _pinfoSelectedBranch = { code: code, name: name };

      document.getElementById('pinfo-branchSearch').value = '';
      document.getElementById('pinfo-branchSearchWrap').style.display = 'none';
      document.getElementById('pinfo-branchResults').classList.remove('show');
      var chip = document.getElementById('pinfo-branchChip');
      chip.classList.add('show');
      document.getElementById('pinfo-branchChipName').textContent = name;
      document.getElementById('pinfo-branchChipCode').textContent = '支店コード: ' + code;
    }

    function pinfoClearBranch() {
      _pinfoClearBranchInternal();
    }

    function _pinfoClearBranchInternal() {
      _pinfoSelectedBranch = null;
      document.getElementById('pinfo-branchSearchWrap').style.display = '';
      document.getElementById('pinfo-branchSearch').value = '';
      document.getElementById('pinfo-branchChip').classList.remove('show');
    }

    // ========================================
    // 住所検索
    // ========================================

    async function pinfoSearchAddress() {
      var postalInput = document.getElementById('pinfo-postalCode');
      var btn = document.getElementById('pinfo-postalSearchBtn');
      var postalCode = postalInput.value.replace(/[^0-9]/g, '');

      if (postalCode.length !== 7) {
        alert('郵便番号は7桁で入力してください（例: 100-0001 または 1000001）');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="bi bi-arrow-repeat"></i> 検索中...';

      try {
        var response = await fetch('https://zipcloud.ibsnet.co.jp/api/search?zipcode=' + postalCode);
        var data = await response.json();
        if (data.status === 200 && data.results && data.results.length > 0) {
          var result = data.results[0];
          document.getElementById('pinfo-prefecture').value = result.address1;
          document.getElementById('pinfo-city').value = result.address2 + result.address3;
          document.getElementById('pinfo-street').value = '';
          postalInput.value = postalCode.substring(0, 3) + '-' + postalCode.substring(3);
        } else {
          alert('該当する住所が見つかりませんでした。郵便番号を確認してください。');
        }
      } catch (error) {
        console.error('[PostalSearch] エラー:', error);
        alert('住所検索に失敗しました。しばらくしてから再度お試しください。');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-search"></i> 住所検索';
      }
    }

    // ========================================
    // 保存
    // ========================================

    async function pinfoSave() {
      var saveBtn = document.getElementById('pinfo-saveBtn');
      saveBtn.disabled = true;
      saveBtn.textContent = '保存中...';

      try {
        // バリデーション: 銀行選択したら支店も必須
        if (_pinfoSelectedBank && !_pinfoSelectedBranch) {
          alert('支店を選択してください');
          saveBtn.disabled = false; saveBtn.textContent = '保存する'; return;
        }

        var newData = {
          shipping: {
            lastName: document.getElementById('pinfo-lastName').value.trim(),
            firstName: document.getElementById('pinfo-firstName').value.trim(),
            postalCode: document.getElementById('pinfo-postalCode').value.trim(),
            prefecture: document.getElementById('pinfo-prefecture').value,
            city: document.getElementById('pinfo-city').value.trim(),
            street: document.getElementById('pinfo-street').value.trim(),
            building: document.getElementById('pinfo-building').value.trim(),
            phone: document.getElementById('pinfo-phone').value.trim()
          },
          bank: {
            bankCode: _pinfoSelectedBank ? _pinfoSelectedBank.code : '',
            bankName: _pinfoSelectedBank ? _pinfoSelectedBank.name : '',
            branchCode: _pinfoSelectedBranch ? _pinfoSelectedBranch.code : '',
            branchName: _pinfoSelectedBranch ? _pinfoSelectedBranch.name : '',
            accountType: document.getElementById('pinfo-accountType').value,
            accountNumber: document.getElementById('pinfo-accountNumber').value.trim(),
            accountHolder: document.getElementById('pinfo-accountHolder').value.trim()
          }
        };

        var userEmail = localStorage.getItem('reborn_user_email');
        var userRef = doc(db, 'users', userEmail);
        await updateDoc(userRef, { personalInfo: newData });

        _pinfoData = newData;

        // タスク自動完了
        _pinfoAutoCompleteTasks(userEmail, newData);

        alert('個人情報を保存しました');
      } catch (error) {
        console.error('[PersonalInfo] 保存エラー:', error);
        alert('個人情報の保存に失敗しました');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = '保存する';
      }
    }

    // ========================================
    // タスク自動完了
    // ========================================

    async function _pinfoAutoCompleteTasks(email, data) {
      try {
        var _col = window.firestoreCollection;
        var _qry = window.firestoreQuery;
        var _whr = window.firestoreWhere;
        var _gds = window.firestoreGetDocs;
        var _upd = window.firestoreUpdateDoc;
        if (!_col || !_qry || !_whr || !_gds || !_upd) return;

        var tasksRef = _col(db, 'userTasks', email, 'tasks');

        // 発送先情報が入力されている場合 → shipping_info_registration完了
        var sh = data.shipping;
        if (sh.lastName && sh.postalCode && sh.prefecture && sh.city && sh.street && sh.phone) {
          var sq = _qry(tasksRef, _whr('type', '==', 'shipping_info_registration'), _whr('completed', '==', false));
          var sSnap = await _gds(sq);
          sSnap.forEach(function(d) {
            _upd(doc(db, 'userTasks', email, 'tasks', d.id), { completed: true });
          });
        }

        // 口座情報が入力されている場合 → bank_account_registration完了
        var bk = data.bank;
        if (bk.bankCode && bk.bankName && bk.branchCode && bk.branchName && bk.accountNumber && bk.accountHolder) {
          var bq = _qry(tasksRef, _whr('type', '==', 'bank_account_registration'), _whr('completed', '==', false));
          var bSnap = await _gds(bq);
          bSnap.forEach(function(d) {
            _upd(doc(db, 'userTasks', email, 'tasks', d.id), { completed: true });
          });
        }

        // バッジ更新
        if (typeof window.updateTaskBadge === 'function') {
          window.updateTaskBadge();
        }
      } catch (e) {
        console.error('[PersonalInfo] タスク自動完了エラー:', e);
      }
    }

    // ========================================
    // ナビゲーション
    // ========================================

    function pinfoGoBack() {
      if (typeof spaGoBack === 'function') {
        spaGoBack();
      } else {
        window.location.href = '/';
      }
    }

    // グローバル公開
    window.initPersonalInfoPage = initPersonalInfoPage;
    window.destroyPersonalInfoPage = destroyPersonalInfoPage;
    window.pinfoGoBack = pinfoGoBack;
    window.pinfoSearchAddress = pinfoSearchAddress;
    window.pinfoSave = pinfoSave;
    window.pinfoClearBank = pinfoClearBank;
    window.pinfoClearBranch = pinfoClearBranch;
  })();
  </script>
</div>
