  <script>
  (function() {
    var db = window.firebaseDB;
    var doc = window.firestoreDoc;
    var getDoc = window.firestoreGetDoc;
    var updateDoc = window.firestoreUpdateDoc;

    var _pinfoData = {
      shipping: { name: '', postalCode: '', address: '', phone: '' },
      bank: { bankCode: '', bankName: '', branchCode: '', branchName: '', accountType: '', accountNumber: '', accountHolder: '' }
    };
    var _pinfoBankCache = null;
    var _pinfoBranchCache = {};

    // ========================================
    // 初期化・破棄
    // ========================================

    async function initPersonalInfoPage() {
      var userEmail = localStorage.getItem('reborn_user_email');
      if (!userEmail || !db) return;

      await _pinfoLoadData(userEmail);
      _pinfoPopulateForm();
      _pinfoSetupListeners();
    }

    function destroyPersonalInfoPage() {
      _pinfoData = {
        shipping: { name: '', postalCode: '', address: '', phone: '' },
        bank: { bankCode: '', bankName: '', branchCode: '', branchName: '', accountType: '', accountNumber: '', accountHolder: '' }
      };
    }

    // ========================================
    // データ読み込み
    // ========================================

    async function _pinfoLoadData(email) {
      try {
        var userRef = doc(db, 'users', email);
        var userSnap = await getDoc(userRef);
        if (userSnap.exists()) {
          var data = userSnap.data();
          if (data.personalInfo) {
            _pinfoData = {
              shipping: data.personalInfo.shipping || { name: '', postalCode: '', address: '', phone: '' },
              bank: data.personalInfo.bank || { bankCode: '', bankName: '', branchCode: '', branchName: '', accountType: '', accountNumber: '', accountHolder: '' }
            };
          }
        }
      } catch (error) {
        console.error('[PersonalInfo] 読み込みエラー:', error);
      }
    }

    function _pinfoPopulateForm() {
      // 発送先
      document.getElementById('pinfo-name').value = _pinfoData.shipping.name || '';
      document.getElementById('pinfo-postalCode').value = _pinfoData.shipping.postalCode || '';
      document.getElementById('pinfo-address').value = _pinfoData.shipping.address || '';
      document.getElementById('pinfo-phone').value = _pinfoData.shipping.phone || '';

      // 口座
      var bankCode = _pinfoData.bank.bankCode || '';
      var bankName = _pinfoData.bank.bankName || '';
      var branchCode = _pinfoData.bank.branchCode || '';
      var branchName = _pinfoData.bank.branchName || '';
      var isManualBank = _pinfoData.bank.isManualBank || false;
      var isManualBranch = _pinfoData.bank.isManualBranch || false;

      document.getElementById('pinfo-bankCode').value = bankCode;
      document.getElementById('pinfo-bankNameDisplay').textContent = bankName || '-';
      document.getElementById('pinfo-branchCode').value = branchCode;
      document.getElementById('pinfo-branchNameDisplay').textContent = branchName || '-';
      document.getElementById('pinfo-accountType').value = _pinfoData.bank.accountType || 'ordinary';
      document.getElementById('pinfo-accountNumber').value = _pinfoData.bank.accountNumber || '';
      document.getElementById('pinfo-accountHolder').value = _pinfoData.bank.accountHolder || '';

      // 銀行カードUI初期化
      if (bankCode && bankName) {
        if (isManualBank) {
          _pinfoUpdateBankCard('manual', bankName, bankCode);
          document.getElementById('pinfo-bankNameManual').value = bankName;
        } else {
          _pinfoUpdateBankCard('success', bankName, bankCode);
        }
      } else {
        _pinfoUpdateBankCard('initial', '', '');
      }

      // 支店カードUI初期化
      if (branchCode && branchName) {
        if (isManualBranch) {
          _pinfoUpdateBranchCard('manual', branchName, branchCode);
          document.getElementById('pinfo-branchNameManual').value = branchName;
        } else {
          _pinfoUpdateBranchCard('success', branchName, branchCode);
        }
      } else {
        _pinfoUpdateBranchCard('initial', '', '');
      }
    }

    function _pinfoSetupListeners() {
      var bankCodeInput = document.getElementById('pinfo-bankCode');
      var branchCodeInput = document.getElementById('pinfo-branchCode');
      bankCodeInput.addEventListener('input', _pinfoOnBankCodeInput);
      branchCodeInput.addEventListener('input', _pinfoOnBranchCodeInput);
    }

    // ========================================
    // 銀行データAPI
    // ========================================

    async function _pinfoFetchBankData() {
      if (_pinfoBankCache) return _pinfoBankCache;
      try {
        var response = await fetch('https://zengin-code.github.io/api/banks.json');
        if (!response.ok) throw new Error('Failed to fetch bank data');
        _pinfoBankCache = await response.json();
        return _pinfoBankCache;
      } catch (error) {
        console.error('[BankCode] 銀行データ取得エラー:', error);
        return null;
      }
    }

    async function _pinfoFetchBranchData(bankCode) {
      if (_pinfoBranchCache[bankCode]) return _pinfoBranchCache[bankCode];
      try {
        var response = await fetch('https://morix1500.github.io/zengin/data/branches/' + bankCode + '.json');
        if (!response.ok) throw new Error('Failed to fetch branch data');
        var branches = await response.json();
        _pinfoBranchCache[bankCode] = branches;
        return branches;
      } catch (error) {
        console.error('[BankCode] 支店データ取得エラー:', error);
        return null;
      }
    }

    async function _pinfoLookupBank(code) {
      var data = await _pinfoFetchBankData();
      return data && data[code] ? data[code].name : null;
    }

    async function _pinfoLookupBranch(bankCode, branchCode) {
      var branches = await _pinfoFetchBranchData(bankCode);
      if (!branches) return null;
      var b = branches.find(function(x) { return x.code === branchCode; });
      return b ? b.name : null;
    }

    // ========================================
    // カードUI更新
    // ========================================

    function _pinfoUpdateBankCard(state, name, code) {
      var card = document.getElementById('pinfo-bankInfoCard');
      var icon = document.getElementById('pinfo-bankInfoIcon');
      var nameEl = document.getElementById('pinfo-bankInfoName');
      var codeEl = document.getElementById('pinfo-bankInfoCode');
      var manualLink = document.getElementById('pinfo-bankManualLink');
      var manualInput = document.getElementById('pinfo-bankNameManual');
      var errorEl = document.getElementById('pinfo-bankCodeError');

      card.className = 'pinfo-bank-card';
      icon.className = 'pinfo-bank-icon';
      nameEl.className = 'pinfo-bank-name';

      switch (state) {
        case 'initial':
          nameEl.textContent = 'コードを入力してください'; nameEl.classList.add('placeholder');
          icon.innerHTML = '<i class="bi bi-bank"></i>'; codeEl.textContent = '';
          manualLink.classList.remove('hidden'); manualInput.style.display = 'none'; errorEl.textContent = ''; break;
        case 'loading':
          card.classList.add('loading'); icon.classList.add('loading');
          icon.innerHTML = '<i class="bi bi-arrow-repeat"></i>';
          nameEl.textContent = '検索中...'; nameEl.classList.add('placeholder');
          codeEl.textContent = 'コード: ' + code; manualLink.classList.remove('hidden'); errorEl.textContent = ''; break;
        case 'success':
          card.classList.add('success'); icon.classList.add('success');
          icon.innerHTML = '<i class="bi bi-check-lg"></i>';
          nameEl.textContent = name; codeEl.textContent = '金融機関コード: ' + code;
          manualLink.classList.remove('hidden'); manualInput.style.display = 'none'; errorEl.textContent = ''; break;
        case 'error':
          card.classList.add('error'); icon.classList.add('error');
          icon.innerHTML = '<i class="bi bi-exclamation-triangle"></i>';
          nameEl.textContent = '金融機関が見つかりません'; codeEl.textContent = '入力コード: ' + code;
          manualLink.classList.remove('hidden'); errorEl.textContent = ''; break;
        case 'manual':
          card.classList.add('manual'); icon.classList.add('manual');
          icon.innerHTML = '<i class="bi bi-pencil-square"></i>';
          nameEl.textContent = name || '手動入力モード';
          codeEl.textContent = code ? 'コード: ' + code : '銀行名を下に入力してください';
          manualLink.classList.add('hidden'); manualInput.style.display = 'block'; errorEl.textContent = ''; break;
      }
    }

    function _pinfoUpdateBranchCard(state, name, code) {
      var card = document.getElementById('pinfo-branchInfoCard');
      var icon = document.getElementById('pinfo-branchInfoIcon');
      var nameEl = document.getElementById('pinfo-branchInfoName');
      var codeEl = document.getElementById('pinfo-branchInfoCode');
      var manualLink = document.getElementById('pinfo-branchManualLink');
      var manualInput = document.getElementById('pinfo-branchNameManual');
      var errorEl = document.getElementById('pinfo-branchCodeError');

      card.className = 'pinfo-bank-card';
      icon.className = 'pinfo-bank-icon';
      nameEl.className = 'pinfo-bank-name';

      switch (state) {
        case 'initial':
          nameEl.textContent = 'コードを入力してください'; nameEl.classList.add('placeholder');
          icon.innerHTML = '<i class="bi bi-building"></i>'; codeEl.textContent = '';
          manualLink.classList.remove('hidden'); manualInput.style.display = 'none'; errorEl.textContent = ''; break;
        case 'loading':
          card.classList.add('loading'); icon.classList.add('loading');
          icon.innerHTML = '<i class="bi bi-arrow-repeat"></i>';
          nameEl.textContent = '検索中...'; nameEl.classList.add('placeholder');
          codeEl.textContent = 'コード: ' + code; manualLink.classList.remove('hidden'); errorEl.textContent = ''; break;
        case 'success':
          card.classList.add('success'); icon.classList.add('success');
          icon.innerHTML = '<i class="bi bi-check-lg"></i>';
          nameEl.textContent = name; codeEl.textContent = '支店コード: ' + code;
          manualLink.classList.remove('hidden'); manualInput.style.display = 'none'; errorEl.textContent = ''; break;
        case 'error':
          card.classList.add('error'); icon.classList.add('error');
          icon.innerHTML = '<i class="bi bi-exclamation-triangle"></i>';
          nameEl.textContent = '支店が見つかりません'; codeEl.textContent = '入力コード: ' + code;
          manualLink.classList.remove('hidden'); errorEl.textContent = ''; break;
        case 'manual':
          card.classList.add('manual'); icon.classList.add('manual');
          icon.innerHTML = '<i class="bi bi-pencil-square"></i>';
          nameEl.textContent = name || '手動入力モード';
          codeEl.textContent = code ? 'コード: ' + code : '支店名を下に入力してください';
          manualLink.classList.add('hidden'); manualInput.style.display = 'block'; errorEl.textContent = ''; break;
        case 'waiting':
          nameEl.textContent = '先に金融機関コードを入力'; nameEl.classList.add('placeholder');
          icon.innerHTML = '<i class="bi bi-building"></i>'; codeEl.textContent = '';
          manualLink.classList.remove('hidden'); manualInput.style.display = 'none'; errorEl.textContent = ''; break;
      }
    }

    // ========================================
    // 入力イベント
    // ========================================

    async function _pinfoOnBankCodeInput(event) {
      var input = event.target;
      var code = input.value.replace(/[^0-9]/g, '');
      input.value = code;
      var displayEl = document.getElementById('pinfo-bankNameDisplay');
      document.getElementById('pinfo-bankNameManual').value = '';
      document.getElementById('pinfo-bankNameManual').style.display = 'none';

      if (code.length === 0) { displayEl.textContent = '-'; _pinfoUpdateBankCard('initial', '', ''); return; }
      if (code.length < 4) { displayEl.textContent = '...'; _pinfoUpdateBankCard('loading', '', code); return; }

      _pinfoUpdateBankCard('loading', '', code);
      var bankName = await _pinfoLookupBank(code);
      if (bankName) {
        displayEl.textContent = bankName;
        _pinfoUpdateBankCard('success', bankName, code);
        document.getElementById('pinfo-branchCode').value = '';
        document.getElementById('pinfo-branchNameDisplay').textContent = '-';
        document.getElementById('pinfo-branchNameManual').value = '';
        document.getElementById('pinfo-branchNameManual').style.display = 'none';
        _pinfoUpdateBranchCard('initial', '', '');
      } else {
        displayEl.textContent = '該当なし';
        _pinfoUpdateBankCard('error', '', code);
      }
    }

    async function _pinfoOnBranchCodeInput(event) {
      var input = event.target;
      var code = input.value.replace(/[^0-9]/g, '');
      input.value = code;
      var displayEl = document.getElementById('pinfo-branchNameDisplay');
      var bankCode = document.getElementById('pinfo-bankCode').value;
      document.getElementById('pinfo-branchNameManual').value = '';
      document.getElementById('pinfo-branchNameManual').style.display = 'none';

      if (code.length === 0) { displayEl.textContent = '-'; _pinfoUpdateBranchCard('initial', '', ''); return; }
      if (!bankCode || bankCode.length < 4) { displayEl.textContent = '-'; _pinfoUpdateBranchCard('waiting', '', ''); return; }
      if (code.length < 3) { displayEl.textContent = '...'; _pinfoUpdateBranchCard('loading', '', code); return; }

      _pinfoUpdateBranchCard('loading', '', code);
      var branchName = await _pinfoLookupBranch(bankCode, code);
      if (branchName) {
        displayEl.textContent = branchName;
        _pinfoUpdateBranchCard('success', branchName, code);
      } else {
        displayEl.textContent = '該当なし';
        _pinfoUpdateBranchCard('error', '', code);
      }
    }

    // ========================================
    // 住所検索
    // ========================================

    async function pinfoSearchAddress() {
      var postalInput = document.getElementById('pinfo-postalCode');
      var addressInput = document.getElementById('pinfo-address');
      var btn = document.getElementById('pinfo-postalSearchBtn');
      var postalCode = postalInput.value.replace(/[^0-9]/g, '');

      if (postalCode.length !== 7) {
        alert('郵便番号は7桁で入力してください（例: 100-0001 または 1000001）');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="bi bi-arrow-repeat"></i> 検索中...';

      try {
        var response = await fetch('https://zipcloud.ibsnet.co.jp/api/search?zipcode=' + postalCode);
        var data = await response.json();
        if (data.status === 200 && data.results && data.results.length > 0) {
          var result = data.results[0];
          addressInput.value = result.address1 + result.address2 + result.address3;
          postalInput.value = postalCode.substring(0, 3) + '-' + postalCode.substring(3);
        } else {
          alert('該当する住所が見つかりませんでした。郵便番号を確認してください。');
        }
      } catch (error) {
        console.error('[PostalSearch] エラー:', error);
        alert('住所検索に失敗しました。しばらくしてから再度お試しください。');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-search"></i> 住所検索';
      }
    }

    // ========================================
    // 保存
    // ========================================

    async function pinfoSave() {
      var saveBtn = document.getElementById('pinfo-saveBtn');
      saveBtn.disabled = true;
      saveBtn.textContent = '保存中...';

      try {
        var bankCode = document.getElementById('pinfo-bankCode').value.trim();
        var branchCode = document.getElementById('pinfo-branchCode').value.trim();
        var bankInfoCard = document.getElementById('pinfo-bankInfoCard');
        var branchInfoCard = document.getElementById('pinfo-branchInfoCard');
        var bankNameManual = document.getElementById('pinfo-bankNameManual').value.trim();
        var branchNameManual = document.getElementById('pinfo-branchNameManual').value.trim();
        var bankInfoName = document.getElementById('pinfo-bankInfoName').textContent;
        var branchInfoName = document.getElementById('pinfo-branchInfoName').textContent;

        var isManualBank = bankInfoCard.classList.contains('manual');
        var isManualBranch = branchInfoCard.classList.contains('manual');

        var finalBankName = '';
        if (isManualBank) { finalBankName = bankNameManual; }
        else if (bankInfoCard.classList.contains('success')) { finalBankName = bankInfoName; }

        var finalBranchName = '';
        if (isManualBranch) { finalBranchName = branchNameManual; }
        else if (branchInfoCard.classList.contains('success')) { finalBranchName = branchInfoName; }

        // バリデーション
        if (bankCode || branchCode) {
          if (!bankCode || bankCode.length !== 4) {
            alert('金融機関コードは4桁で入力してください');
            saveBtn.disabled = false; saveBtn.textContent = '保存する'; return;
          }
          if (isManualBank && !bankNameManual) {
            alert('銀行名を入力してください');
            saveBtn.disabled = false; saveBtn.textContent = '保存する'; return;
          }
          if (!isManualBank && !bankInfoCard.classList.contains('success')) {
            alert('有効な金融機関コードを入力するか、手動入力ボタンで銀行名を入力してください');
            saveBtn.disabled = false; saveBtn.textContent = '保存する'; return;
          }
          if (!branchCode || branchCode.length !== 3) {
            alert('支店コードは3桁で入力してください');
            saveBtn.disabled = false; saveBtn.textContent = '保存する'; return;
          }
          if (isManualBranch && !branchNameManual) {
            alert('支店名を入力してください');
            saveBtn.disabled = false; saveBtn.textContent = '保存する'; return;
          }
          if (!isManualBranch && !branchInfoCard.classList.contains('success')) {
            alert('有効な支店コードを入力するか、手動入力ボタンで支店名を入力してください');
            saveBtn.disabled = false; saveBtn.textContent = '保存する'; return;
          }
        }

        var newData = {
          shipping: {
            name: document.getElementById('pinfo-name').value.trim(),
            postalCode: document.getElementById('pinfo-postalCode').value.trim(),
            address: document.getElementById('pinfo-address').value.trim(),
            phone: document.getElementById('pinfo-phone').value.trim()
          },
          bank: {
            bankCode: bankCode,
            bankName: finalBankName,
            branchCode: branchCode,
            branchName: finalBranchName,
            accountType: document.getElementById('pinfo-accountType').value,
            accountNumber: document.getElementById('pinfo-accountNumber').value.trim(),
            accountHolder: document.getElementById('pinfo-accountHolder').value.trim(),
            isManualBank: isManualBank,
            isManualBranch: isManualBranch
          }
        };

        var userEmail = localStorage.getItem('reborn_user_email');
        var userRef = doc(db, 'users', userEmail);
        await updateDoc(userRef, { personalInfo: newData });

        _pinfoData = newData;
        alert('個人情報を保存しました');
      } catch (error) {
        console.error('[PersonalInfo] 保存エラー:', error);
        alert('個人情報の保存に失敗しました');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = '保存する';
      }
    }

    // ========================================
    // ナビゲーション
    // ========================================

    function pinfoGoBack() {
      if (typeof spaGoBack === 'function') {
        spaGoBack();
      } else {
        window.location.href = '/';
      }
    }

    // グローバル公開
    window.initPersonalInfoPage = initPersonalInfoPage;
    window.destroyPersonalInfoPage = destroyPersonalInfoPage;
    window.pinfoGoBack = pinfoGoBack;
    window.pinfoSearchAddress = pinfoSearchAddress;
    window.pinfoSave = pinfoSave;
    window.pinfoEnableManualBank = function() {
      var code = document.getElementById('pinfo-bankCode').value;
      _pinfoUpdateBankCard('manual', '', code);
      document.getElementById('pinfo-bankNameManual').focus();
    };
    window.pinfoEnableManualBranch = function() {
      var code = document.getElementById('pinfo-branchCode').value;
      _pinfoUpdateBranchCard('manual', '', code);
      document.getElementById('pinfo-branchNameManual').focus();
    };
  })();
  </script>
</div>
