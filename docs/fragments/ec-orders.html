        ※ 段階モード: ルールは日数が大きい順にチェックされ、最初に一致した条件を適用。<br>
        ※ 毎日モード: 開始日から毎日指定額を値下げ（下限価格で停止）。<br>
        ※ 下限価格を下回る値下げは自動的にブロックされます。
      </div>
    </div>
  </div>

  <div class="eco-modal-overlay" id="eco-modal">
    <div class="eco-modal">
      <button class="eco-modal-close" onclick="ecoCloseModal()">&times;</button>
      <h3 id="eco-modal-title">注文詳細</h3>
      <div id="eco-modal-body"></div>
    </div>
  </div>

  <script>
  (function() {
    'use strict';

    var _ecoOrders = [];
    var _ecoCurrentFilter = 'all';
    var _ecoUnsubscribe = null;
    var _ecoProductCache = {}; // productId -> { image, name }

    window.initEcOrdersPage = function() {
      ecoLoadOrders();
    };

    window.destroyEcOrdersPage = function() {
      if (_ecoUnsubscribe) {
        _ecoUnsubscribe();
        _ecoUnsubscribe = null;
      }
      _ecoOrders = [];
      document.removeEventListener('click', _ecoCloseMenuOnClick);
    };

    // Dropdown menu
    function _ecoCloseMenuOnClick(e) {
      var dd = document.getElementById('eco-dropdown');
      if (dd && !dd.contains(e.target) && !e.target.closest('.eco-sub-header-icon')) {
        dd.classList.remove('show');
      }
    }
    document.addEventListener('click', _ecoCloseMenuOnClick);

    window.ecoToggleMenu = function(e) {
      e.stopPropagation();
      var dd = document.getElementById('eco-dropdown');
      dd.classList.toggle('show');
    };

    window.ecoExportCSV = function() {
      document.getElementById('eco-dropdown').classList.remove('show');
      if (_ecoOrders.length === 0) { alert('エクスポートする注文がありません'); return; }

      var rows = [['注文番号', 'ステータス', '商品名', '金額', '顧客メール', '配送先名', '注文日', '配送業者', '追跡番号']];
      _ecoOrders.forEach(function(o) {
        var displayId = o.sessionId ? o.sessionId.substring(0, 24).toUpperCase() : o.id.substring(0, 8);
        var items = (o.items || []).map(function(it) { return it.name; }).join(' / ');
        var dateStr = '';
        if (o.createdAt && o.createdAt.toDate) {
          var d = o.createdAt.toDate();
          dateStr = d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate();
        }
        rows.push([
          displayId,
          ecoStatusLabel(o.status),
          items,
          o.amountTotal || 0,
          o.customerEmail || '',
          o.shippingName || '',
          dateStr,
          ecoCarrierLabel(o.carrier) || '',
          o.trackingNumber || ''
        ]);
      });

      var csv = rows.map(function(r) {
        return r.map(function(c) { return '"' + String(c).replace(/"/g, '""') + '"'; }).join(',');
      }).join('\n');
      var bom = '\uFEFF';
      var blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'ec-orders-' + new Date().toISOString().slice(0, 10) + '.csv';
      a.click();
      URL.revokeObjectURL(url);
    };

    function ecoLoadOrders() {
      var db = firebase.firestore();
      _ecoUnsubscribe = db.collection('orders')
        .orderBy('createdAt', 'desc')
        .onSnapshot(function(snap) {
          _ecoOrders = [];
          var needFetch = [];
          snap.forEach(function(doc) {
            var d = doc.data();
            d.id = doc.id;
            _ecoOrders.push(d);
            (d.productIds || []).forEach(function(pid) {
              if (!_ecoProductCache[pid]) needFetch.push(pid);
            });
          });
          ecoUpdateSummary();
          ecoRenderList();
          if (needFetch.length > 0) ecoFetchProductImages(needFetch);
        }, function(err) {
          console.error('[EC Orders] Load error:', err);
          document.getElementById('eco-list').innerHTML =
            '<div class="eco-empty"><i class="bi bi-exclamation-circle"></i>注文データの読み込みに失敗しました</div>';
        });
    }

    function ecoFetchProductImages(pids) {
      var db = firebase.firestore();
      var unique = pids.filter(function(v, i, a) { return a.indexOf(v) === i; });
      unique.forEach(function(pid) {
        db.collection('products').doc(pid).get().then(function(doc) {
          if (!doc.exists) return;
          var data = doc.data();
          var img = '';
          if (data.images && Array.isArray(data.images) && data.images.length > 0) {
            img = data.images[0];
          } else if (data.images && data.images.imageUrls && data.images.imageUrls.length > 0) {
            img = data.images.imageUrls[0];
          } else {
            img = data.imageUrl1 || '';
          }
          _ecoProductCache[pid] = { image: img, name: data.productName || '' };
          ecoRenderList();
        }).catch(function() {});
      });
    }

    function ecoUpdateSummary() {
      var paid = 0, shipped = 0;
      _ecoOrders.forEach(function(o) {
        if (o.status === 'paid') paid++;
        else if (o.status === 'shipped') shipped++;
      });
      document.getElementById('eco-count-paid').textContent = paid;
      document.getElementById('eco-count-shipped').textContent = shipped;
      document.getElementById('eco-count-total').textContent = _ecoOrders.length;

      var badge = document.getElementById('eco-badge-paid');
      if (paid > 0) {
        badge.textContent = paid;
        badge.style.display = 'inline-block';
      } else {
        badge.style.display = 'none';
      }
    }

    function ecoRenderList() {
      var filtered = _ecoOrders;
      if (_ecoCurrentFilter !== 'all') {
        filtered = _ecoOrders.filter(function(o) { return o.status === _ecoCurrentFilter; });
      }

      var listEl = document.getElementById('eco-list');
      if (filtered.length === 0) {
        var msg = _ecoCurrentFilter === 'all' ? '注文はまだありません' : 'この状態の注文はありません';
        listEl.innerHTML = '<div class="eco-empty"><i class="bi bi-inbox"></i>' + msg + '</div>';
        return;
      }

      var html = '';
      filtered.forEach(function(order) {
        var itemNames = (order.items || []).map(function(it) { return it.name; }).join(', ') || '商品情報なし';
        var amount = order.amountTotal || 0;
        var dateStr = '';
        if (order.createdAt && order.createdAt.toDate) {
          var d = order.createdAt.toDate();
          dateStr = (d.getMonth() + 1) + '/' + d.getDate() + ' ' +
            ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
        }
        var statusClass = 'eco-status-' + (order.status || 'paid');
        var statusText = ecoStatusLabel(order.status);
        var orderId = order.sessionId ? order.sessionId.substring(0, 24).toUpperCase() : order.id.substring(0, 8);

        var imgHtml = '';
        var firstPid = (order.productIds || [])[0];
        var cached = firstPid ? _ecoProductCache[firstPid] : null;
        if (cached && cached.image) {
          imgHtml = '<img class="eco-card-img" src="' + cached.image + '" alt="" onerror="this.style.display=\'none\'">';
        } else {
          imgHtml = '<div class="eco-card-img-placeholder"><i class="bi bi-bag"></i></div>';
        }

        html += '<div class="eco-card" onclick="ecoShowDetail(\'' + order.id + '\')">';
        html += imgHtml;
        html += '<div class="eco-card-body">';
        html += '<div class="eco-card-header">';
        html += '<span class="eco-order-id">#' + orderId + '</span>';
        html += '<span class="eco-status ' + statusClass + '">' + statusText + '</span>';
        html += '</div>';
        html += '<div class="eco-card-items">' + ecoEscapeHtml(itemNames) + '</div>';
        html += '<div class="eco-card-meta">';
        html += '<span>' + dateStr + '</span>';
        html += '<span class="eco-card-amount">&yen;' + amount.toLocaleString() + '</span>';
        html += '</div>';
        html += '</div>';
        html += '</div>';
      });
      listEl.innerHTML = html;
    }

    window.ecoSwitchTab = function(filter) {
      _ecoCurrentFilter = filter;
      document.querySelectorAll('#spa-page-ec-orders .eco-tab').forEach(function(tab) {
        tab.classList.toggle('active', tab.getAttribute('data-filter') === filter);
      });
      ecoRenderList();
    };

    window.ecoShowDetail = function(orderId) {
      var order = _ecoOrders.find(function(o) { return o.id === orderId; });
      if (!order) return;

      var displayId = order.sessionId ? order.sessionId.substring(0, 24).toUpperCase() : order.id.substring(0, 8);
      document.getElementById('eco-modal-title').textContent = '注文 #' + displayId;

      var itemsHtml = '<ul class="eco-detail-items" style="list-style:none;padding:0;margin:0">';
      (order.items || []).forEach(function(item, idx) {
        var pid = (order.productIds || [])[idx];
        var pc = pid ? _ecoProductCache[pid] : null;
        var thumbHtml = '';
        if (pc && pc.image) {
          thumbHtml = '<img src="' + pc.image + '" style="width:40px;height:40px;border-radius:6px;object-fit:cover;margin-right:10px;vertical-align:middle;" onerror="this.style.display=\'none\'">';
        }
        itemsHtml += '<li style="display:flex;align-items:center">' + thumbHtml +
          '<span style="flex:1">' + ecoEscapeHtml(item.name || '') + ' &times;' + (item.quantity || 1) + '</span>' +
          '<span style="font-weight:600;white-space:nowrap">&yen;' + (item.amount || 0).toLocaleString() + '</span></li>';
      });
      itemsHtml += '</ul>';

      var dateStr = '';
      if (order.createdAt && order.createdAt.toDate) {
        var d = order.createdAt.toDate();
        dateStr = d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate() + ' ' +
          ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
      }

      var addr = order.shippingAddress || {};
      var addrText = [
        addr.postal_code ? '\u3012' + addr.postal_code : '',
        addr.state || '',
        addr.city || '',
        addr.line1 || '',
        addr.line2 || ''
      ].filter(Boolean).join(' ');

      var body = '';
      body += '<div class="eco-detail-section">';
      body += '<div class="eco-detail-label">STATUS</div>';
      body += '<div class="eco-detail-value"><span class="eco-status eco-status-' + (order.status || 'paid') + '">' + ecoStatusLabel(order.status) + '</span></div>';
      body += '</div>';

      body += '<div class="eco-detail-section">';
      body += '<div class="eco-detail-label">ORDER DATE</div>';
      body += '<div class="eco-detail-value">' + dateStr + '</div>';
      body += '</div>';

      body += '<div class="eco-detail-section">';
      body += '<div class="eco-detail-label">ITEMS</div>';
      body += '<div class="eco-detail-value">' + itemsHtml + '</div>';
      body += '<div style="text-align:right;font-size:16px;font-weight:700;margin-top:8px;padding-top:8px;border-top:2px solid #2C2C2C">&yen;' + (order.amountTotal || 0).toLocaleString() + '</div>';
      body += '</div>';

      body += '<div class="eco-detail-section">';
      body += '<div class="eco-detail-label">CUSTOMER</div>';
      body += '<div class="eco-detail-value">' + ecoEscapeHtml(order.customerEmail || '-') + '</div>';
      body += '</div>';

      body += '<div class="eco-detail-section">';
      body += '<div class="eco-detail-label">SHIPPING</div>';
      body += '<div class="eco-detail-value">' + ecoEscapeHtml(order.shippingName || '') + '<br>' + ecoEscapeHtml(addrText) + '</div>';
      body += '</div>';

      // Actions based on status
      if (order.status === 'paid') {
        body += '<div class="eco-ship-form">';
        body += '<label>配送業者</label>';
        body += '<select id="eco-carrier">';
        body += '<option value="yamato">ヤマト運輸</option>';
        body += '<option value="sagawa">佐川急便</option>';
        body += '<option value="jppost">日本郵便</option>';
        body += '<option value="other">その他</option>';
        body += '</select>';
        body += '<label>追跡番号</label>';
        body += '<input type="text" id="eco-tracking" placeholder="追跡番号を入力" inputmode="numeric">';
        body += '<label>送料（円）</label>';
        body += '<input type="number" id="eco-shipping-fee" placeholder="0" inputmode="numeric" value="0">';
        body += '<button class="eco-btn-ship" id="eco-btn-ship" onclick="ecoProcessShip(\'' + order.id + '\')">発送処理を実行</button>';
        body += '</div>';
      } else if (order.status === 'shipped') {
        var shipInfo = '';
        if (order.shippedAt && order.shippedAt.toDate) {
          var sd = order.shippedAt.toDate();
          shipInfo += '発送日: ' + sd.getFullYear() + '/' + (sd.getMonth() + 1) + '/' + sd.getDate();
        }
        if (order.carrier) shipInfo += '<br>配送業者: ' + ecoCarrierLabel(order.carrier);
        if (order.trackingNumber) shipInfo += '<br>追跡番号: ' + ecoEscapeHtml(order.trackingNumber);

        body += '<div class="eco-shipped-info">' + shipInfo + '</div>';
        body += '<button class="eco-btn-delivered" onclick="ecoMarkDelivered(\'' + order.id + '\')">配達完了にする</button>';
      } else if (order.status === 'delivered') {
        var delInfo = '';
        if (order.carrier) delInfo += '配送業者: ' + ecoCarrierLabel(order.carrier);
        if (order.trackingNumber) delInfo += '<br>追跡番号: ' + ecoEscapeHtml(order.trackingNumber);
        if (order.deliveredAt && order.deliveredAt.toDate) {
          var dd = order.deliveredAt.toDate();
          delInfo += '<br>配達完了: ' + dd.getFullYear() + '/' + (dd.getMonth() + 1) + '/' + dd.getDate();
        }
        if (delInfo) body += '<div class="eco-shipped-info">' + delInfo + '</div>';
      }

      document.getElementById('eco-modal-body').innerHTML = body;
      document.getElementById('eco-modal').classList.add('show');
    };

    window.ecoCloseModal = function() {
      document.getElementById('eco-modal').classList.remove('show');
    };

    window.ecoProcessShip = function(orderId) {
      var carrier = document.getElementById('eco-carrier').value;
      var tracking = (document.getElementById('eco-tracking').value || '').trim();
      var shippingFee = parseFloat(document.getElementById('eco-shipping-fee').value) || 0;

      var btn = document.getElementById('eco-btn-ship');
      btn.disabled = true;
      btn.textContent = '処理中...';

      var db = firebase.firestore();
      db.collection('orders').doc(orderId).update({
        status: 'shipped',
        carrier: carrier,
        trackingNumber: tracking,
        shippingFee: shippingFee,
        shippedAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(function() {
        // 各商品の利益を確定（送料按分）
        return db.collection('orders').doc(orderId).get();
      }).then(function(orderDoc) {
        if (!orderDoc.exists) return;
        var orderData = orderDoc.data();
        var productIds = orderData.productIds || [];
        var perShipFee = productIds.length > 0 ? Math.round(shippingFee / productIds.length) : 0;

        var promises = productIds.map(function(pid) {
          return db.collection('products').doc(pid).get().then(function(pDoc) {
            if (!pDoc.exists) return;
            var p = pDoc.data();
            var provProfit = p.provisionalProfit || p.finalProfit || 0;
            var pkgCost = p.packagingCostTotal || 0;
            var finalProfit = provProfit - perShipFee - pkgCost;
            var salesAmount = p.saleAmount || 0;
            var profitRate = salesAmount > 0 ? (finalProfit / salesAmount) * 100 : 0;

            return db.collection('products').doc(pid).update({
              shippingConfirmed: true,
              shippingMethod1: carrier,
              shippingFee: perShipFee,
              finalProfit: Math.round(finalProfit),
              profitRate: profitRate
            });
          });
        });
        return Promise.all(promises);
      }).then(function() {
        ecoCloseModal();
        ecoAutoCompleteShipTask(orderId);
      }).catch(function(err) {
        console.error('[EC Orders] Ship error:', err);
        alert('発送処理に失敗しました: ' + err.message);
        btn.disabled = false;
        btn.textContent = '発送処理を実行';
      });
    };

    window.ecoMarkDelivered = function(orderId) {
      if (!confirm('この注文を配達完了にしますか？')) return;
      var db = firebase.firestore();
      db.collection('orders').doc(orderId).update({
        status: 'delivered',
        deliveredAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(function() {
        ecoCloseModal();
      }).catch(function(err) {
        console.error('[EC Orders] Deliver error:', err);
        alert('更新に失敗しました: ' + err.message);
      });
    };

    // Auto-complete EC shipping tasks when shipped from EC管理画面
    function ecoAutoCompleteShipTask(orderId) {
      var db = firebase.firestore();
      var user = firebase.auth().currentUser;
      if (!user || !user.email) return;

      // shipping_task（梱包発送タスク）を自動完了
      db.collection('userTasks').doc(user.email).collection('tasks')
        .where('type', '==', 'shipping_task')
        .where('completed', '==', false)
        .get()
        .then(function(snap) {
          snap.forEach(function(doc) {
            var data = doc.data();
            if (data.relatedData && data.relatedData.orderId === orderId) {
              doc.ref.update({ completed: true, completedAt: new Date().toISOString() });
            }
          });
        })
        .catch(function(err) {
          console.error('[EC Orders] Auto-complete shipping task error:', err);
        });

      // ec_takedown（取り下げタスク）も残っていれば自動完了
      db.collection('userTasks').doc(user.email).collection('tasks')
        .where('type', '==', 'ec_takedown')
        .where('completed', '==', false)
        .get()
        .then(function(snap) {
          snap.forEach(function(doc) {
            var data = doc.data();
            if (data.relatedData && data.relatedData.orderId === orderId) {
              doc.ref.update({ completed: true, completedAt: new Date().toISOString() });
            }
          });
        })
        .catch(function(err) {
          console.error('[EC Orders] Auto-complete takedown task error:', err);
        });
    }

    function ecoStatusLabel(status) {
      switch (status) {
        case 'paid': return '未発送';
        case 'shipped': return '発送済み';
        case 'delivered': return '配達完了';
        default: return status || '不明';
      }
    }

    function ecoCarrierLabel(carrier) {
      switch (carrier) {
        case 'yamato': return 'ヤマト運輸';
        case 'sagawa': return '佐川急便';
        case 'jppost': return '日本郵便';
        case 'other': return 'その他';
        default: return carrier || '';
      }
    }

    function ecoEscapeHtml(str) {
      if (!str) return '';
      var d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // ============================================
    // Auto Price Reduction Settings
    // ============================================
    var ecoPriceRules = [];

    window.ecoOpenPriceSettings = function() {
      var dd = document.getElementById('eco-dropdown');
      if (dd) dd.classList.remove('show');

      var db = (typeof getCompatDb === 'function') ? getCompatDb() : window.db;
      if (!db) { alert('DB未接続'); return; }

      db.collection('settings').doc('ecAutoPriceRules').get().then(function(doc) {
        var data = doc.exists ? doc.data() : {};
        document.getElementById('eco-price-enabled').checked = data.enabled || false;
        document.getElementById('eco-price-exec-hour').value = (data.execHour !== undefined) ? data.execHour : 9;
        document.getElementById('eco-price-floor-type').value = data.floorType || 'purchase_plus_fees';
        document.getElementById('eco-price-floor-margin').value = data.floorMarginPercent || 10;
        ecoToggleFloorMargin();

        // モード
        var mode = data.mode || 'step';
        document.getElementById('eco-price-mode').value = mode;
        ecoToggleRuleMode();

        // 段階ルール
        ecoPriceRules = (data.rules && data.rules.length > 0) ? data.rules : [
          { daysAfter: 7, discountPercent: 5 },
          { daysAfter: 14, discountPercent: 10 },
          { daysAfter: 30, discountPercent: 15 }
        ];
        ecoRenderPriceRules();

        // 毎日ルール
        document.getElementById('eco-daily-amount').value = data.dailyAmount || 100;
        document.getElementById('eco-daily-start-day').value = (data.dailyStartDay !== undefined) ? data.dailyStartDay : 1;
      }).catch(function() {
        ecoPriceRules = [
          { daysAfter: 7, discountPercent: 5 },
          { daysAfter: 14, discountPercent: 10 },
          { daysAfter: 30, discountPercent: 15 }
        ];
        ecoRenderPriceRules();
      });

      document.getElementById('eco-price-modal').classList.add('show');
    };

    window.ecoClosePriceSettings = function() {
      document.getElementById('eco-price-modal').classList.remove('show');
    };

    window.ecoToggleRuleMode = function() {
      var mode = document.getElementById('eco-price-mode').value;
      document.getElementById('eco-step-rules-section').style.display = (mode === 'step') ? 'block' : 'none';
      document.getElementById('eco-daily-rules-section').style.display = (mode === 'daily') ? 'block' : 'none';
    };

    function ecoRenderPriceRules() {
      var container = document.getElementById('eco-price-rules-container');
      container.innerHTML = '';
      ecoPriceRules.forEach(function(rule, idx) {
        var row = document.createElement('div');
        row.className = 'eco-price-rule-row';
        row.innerHTML = '<span class="eco-rule-label">出品から</span>'
          + '<input type="number" value="' + (rule.daysAfter || 7) + '" min="1" max="365" onchange="ecoUpdateRule(' + idx + ',\'days\',this.value)">'
          + '<span class="eco-rule-label">日後</span>'
          + '<input type="number" value="' + (rule.discountPercent || 5) + '" min="1" max="90" onchange="ecoUpdateRule(' + idx + ',\'pct\',this.value)">'
          + '<span class="eco-rule-label">%OFF</span>'
          + '<button class="eco-price-rule-remove" onclick="ecoRemoveRule(' + idx + ')" title="削除"><i class="bi bi-x"></i></button>';
        container.appendChild(row);
      });
    }

    window.ecoAddPriceRule = function() {
      var lastDays = ecoPriceRules.length > 0 ? ecoPriceRules[ecoPriceRules.length - 1].daysAfter + 7 : 7;
      var lastPct = ecoPriceRules.length > 0 ? ecoPriceRules[ecoPriceRules.length - 1].discountPercent + 5 : 5;
      ecoPriceRules.push({ daysAfter: lastDays, discountPercent: Math.min(lastPct, 90) });
      ecoRenderPriceRules();
    };

    window.ecoRemoveRule = function(idx) {
      ecoPriceRules.splice(idx, 1);
      ecoRenderPriceRules();
    };

    window.ecoUpdateRule = function(idx, field, value) {
      if (field === 'days') ecoPriceRules[idx].daysAfter = parseInt(value) || 1;
      if (field === 'pct') ecoPriceRules[idx].discountPercent = parseInt(value) || 1;
    };

    document.getElementById('eco-price-floor-type').addEventListener('change', ecoToggleFloorMargin);
    function ecoToggleFloorMargin() {
      var type = document.getElementById('eco-price-floor-type').value;
      document.getElementById('eco-price-floor-margin-row').style.display = (type === 'fixed_margin') ? 'block' : 'none';
    }

    window.ecoSavePriceSettings = function() {
      var db = (typeof getCompatDb === 'function') ? getCompatDb() : window.db;
      if (!db) { alert('DB未接続'); return; }

      ecoPriceRules.sort(function(a, b) { return a.daysAfter - b.daysAfter; });

      var settings = {
        enabled: document.getElementById('eco-price-enabled').checked,
        execHour: parseInt(document.getElementById('eco-price-exec-hour').value) || 9,
        mode: document.getElementById('eco-price-mode').value,
        rules: ecoPriceRules,
        dailyAmount: parseInt(document.getElementById('eco-daily-amount').value) || 100,
        dailyStartDay: parseInt(document.getElementById('eco-daily-start-day').value) || 1,
        floorType: document.getElementById('eco-price-floor-type').value,
        floorMarginPercent: parseInt(document.getElementById('eco-price-floor-margin').value) || 10,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      db.collection('settings').doc('ecAutoPriceRules').set(settings, { merge: true }).then(function() {
        alert('設定を保存しました');
        ecoClosePriceSettings();
      }).catch(function(err) {
        alert('保存に失敗しました: ' + err.message);
      });
    };
  })();
  </script>
</div>
