<!-- SPA Fragment: ec-orders.html -->
<!-- Prefix: eco- -->
<div id="spa-page-ec-orders">
  <style>
    #spa-page-ec-orders {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: #f8f9fa;
      margin: 0;
      padding: 0;
    }

    /* Sub Header */
    #spa-page-ec-orders .eco-sub-header {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 56px;
      padding: 0 16px;
      background: #ffffff;
      border-bottom: 1px solid #f0f0f0;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    #spa-page-ec-orders .eco-sub-header-back {
      position: absolute;
      left: 8px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: transparent;
      border: none;
      color: #374151;
      font-size: 20px;
      cursor: pointer;
    }
    #spa-page-ec-orders .eco-sub-header-back:hover { background: #f3f4f6; }
    #spa-page-ec-orders .eco-sub-header-title {
      font-size: 17px;
      font-weight: 600;
      color: #111827;
    }
    #spa-page-ec-orders .eco-sub-header-icons {
      position: absolute;
      right: 8px;
      display: flex;
      align-items: center;
      gap: 2px;
    }
    #spa-page-ec-orders .eco-sub-header-icon {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: transparent;
      border: none;
      color: #374151;
      font-size: 20px;
      cursor: pointer;
    }
    #spa-page-ec-orders .eco-sub-header-icon:hover { background: #f3f4f6; }
    #spa-page-ec-orders .eco-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      min-width: 200px;
      padding: 8px 0;
      display: none;
      z-index: 2000;
    }
    #spa-page-ec-orders .eco-dropdown.show { display: block; }
    #spa-page-ec-orders .eco-dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 12px 16px;
      background: none;
      border: none;
      font-size: 14px;
      color: #374151;
      cursor: pointer;
      text-align: left;
    }
    #spa-page-ec-orders .eco-dropdown-item:hover { background: #f3f4f6; }
    #spa-page-ec-orders .eco-dropdown-item i { font-size: 16px; color: #6b7280; width: 20px; text-align: center; }

    #spa-page-ec-orders .eco-content {
      padding: 16px;
      max-width: 800px;
      margin: 0 auto;
    }

    /* Status Tabs */
    #spa-page-ec-orders .eco-tabs {
      display: flex;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 56px;
      z-index: 999;
    }
    #spa-page-ec-orders .eco-tab {
      flex: 1;
      padding: 12px 4px;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: #6b7280;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
    }
    #spa-page-ec-orders .eco-tab:hover { color: #374151; background: #f9fafb; }
    #spa-page-ec-orders .eco-tab.active { color: #2563eb; border-bottom-color: #2563eb; }
    #spa-page-ec-orders .eco-tab-badge {
      display: inline-block;
      background: #ef4444;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      line-height: 18px;
      border-radius: 9px;
      padding: 0 5px;
      margin-left: 4px;
      vertical-align: middle;
    }

    /* Summary */
    #spa-page-ec-orders .eco-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    #spa-page-ec-orders .eco-summary-card {
      background: #fff;
      padding: 14px 12px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    #spa-page-ec-orders .eco-summary-num {
      font-size: 22px;
      font-weight: 700;
      color: #1f2937;
    }
    #spa-page-ec-orders .eco-summary-label {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 2px;
    }

    /* Order Card */
    #spa-page-ec-orders .eco-card {
      background: #fff;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: box-shadow 0.2s;
    }
    #spa-page-ec-orders .eco-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
    #spa-page-ec-orders .eco-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    #spa-page-ec-orders .eco-order-id {
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      font-family: monospace;
    }
    #spa-page-ec-orders .eco-status {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 12px;
    }
    #spa-page-ec-orders .eco-status-paid { background: #fef3c7; color: #92400e; }
    #spa-page-ec-orders .eco-status-shipped { background: #dbeafe; color: #1e40af; }
    #spa-page-ec-orders .eco-status-delivered { background: #d1fae5; color: #065f46; }

    #spa-page-ec-orders .eco-card-items {
      font-size: 14px;
      font-weight: 500;
      color: #1f2937;
      margin-bottom: 4px;
      line-height: 1.4;
    }
    #spa-page-ec-orders .eco-card-meta {
      font-size: 12px;
      color: #9ca3af;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #spa-page-ec-orders .eco-card-amount {
      font-size: 15px;
      font-weight: 700;
      color: #1f2937;
    }

    /* Detail Modal */
    #spa-page-ec-orders .eco-modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 10000;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
      overflow-y: auto;
    }
    #spa-page-ec-orders .eco-modal-overlay.show { display: flex; }
    #spa-page-ec-orders .eco-modal {
      background: #fff;
      border-radius: 14px;
      width: 100%;
      max-width: 500px;
      padding: 24px 20px;
      position: relative;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    #spa-page-ec-orders .eco-modal-close {
      position: absolute;
      top: 12px; right: 12px;
      background: none;
      border: none;
      font-size: 24px;
      color: #9ca3af;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
    }
    #spa-page-ec-orders .eco-modal-close:hover { color: #374151; }
    #spa-page-ec-orders .eco-modal h3 {
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 16px;
      color: #1f2937;
    }
    #spa-page-ec-orders .eco-detail-section {
      margin-bottom: 16px;
    }
    #spa-page-ec-orders .eco-detail-label {
      font-size: 11px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    #spa-page-ec-orders .eco-detail-value {
      font-size: 14px;
      color: #1f2937;
      line-height: 1.5;
    }
    #spa-page-ec-orders .eco-detail-items li {
      padding: 6px 0;
      border-bottom: 1px solid #f3f4f6;
      font-size: 13px;
      color: #374151;
    }
    #spa-page-ec-orders .eco-detail-items li:last-child { border-bottom: none; }

    /* Ship Form */
    #spa-page-ec-orders .eco-ship-form {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 10px;
      padding: 16px;
      margin-top: 16px;
    }
    #spa-page-ec-orders .eco-ship-form label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    #spa-page-ec-orders .eco-ship-form select,
    #spa-page-ec-orders .eco-ship-form input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 12px;
      -webkit-appearance: none;
    }
    #spa-page-ec-orders .eco-btn-ship {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #spa-page-ec-orders .eco-btn-ship:hover { background: #1d4ed8; }
    #spa-page-ec-orders .eco-btn-ship:disabled { background: #9ca3af; cursor: not-allowed; }

    #spa-page-ec-orders .eco-btn-delivered {
      width: 100%;
      padding: 12px;
      background: #059669;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
    }
    #spa-page-ec-orders .eco-btn-delivered:hover { background: #047857; }

    #spa-page-ec-orders .eco-shipped-info {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      padding: 14px;
      margin-top: 16px;
      font-size: 13px;
      color: #166534;
    }

    /* Empty */
    #spa-page-ec-orders .eco-empty {
      text-align: center;
      padding: 60px 20px;
      color: #9ca3af;
      font-size: 14px;
    }
    #spa-page-ec-orders .eco-empty i { font-size: 48px; margin-bottom: 12px; display: block; color: #d1d5db; }

    /* Loading */
    #spa-page-ec-orders .eco-loading {
      text-align: center;
      padding: 40px;
      color: #9ca3af;
      font-size: 14px;
    }
  </style>

  <!-- Sub Header -->
  <div class="eco-sub-header">
    <button class="eco-sub-header-back" onclick="spaGoBack()" title="戻る">
      <i class="bi bi-chevron-left"></i>
    </button>
    <span class="eco-sub-header-title">EC注文管理</span>
    <div class="eco-sub-header-icons">
      <button class="eco-sub-header-icon" onclick="if(window.spaNavigate)spaNavigate('chat_rooms_list')" title="お知らせ">
        <i class="bi bi-bell"></i>
      </button>
      <div style="position: relative;">
        <button class="eco-sub-header-icon" onclick="ecoToggleMenu(event)" title="メニュー">
          <i class="bi bi-list"></i>
        </button>
        <div class="eco-dropdown" id="eco-dropdown">
          <button class="eco-dropdown-item" onclick="window.open('/shop/', '_blank')">
            <i class="bi bi-shop"></i>
            <span>ECサイトを開く</span>
          </button>
          <button class="eco-dropdown-item" onclick="ecoExportCSV()">
            <i class="bi bi-download"></i>
            <span>CSVエクスポート</span>
          </button>
          <button class="eco-dropdown-item" onclick="if(window.spaNavigate)spaNavigate('sales')">
            <i class="bi bi-graph-up"></i>
            <span>売上管理へ</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Status Tabs -->
  <div class="eco-tabs">
    <button class="eco-tab active" data-filter="all" onclick="ecoSwitchTab('all')">
      すべて
    </button>
    <button class="eco-tab" data-filter="paid" onclick="ecoSwitchTab('paid')">
      未発送<span id="eco-badge-paid" class="eco-tab-badge" style="display:none"></span>
    </button>
    <button class="eco-tab" data-filter="shipped" onclick="ecoSwitchTab('shipped')">
      発送済み
    </button>
    <button class="eco-tab" data-filter="delivered" onclick="ecoSwitchTab('delivered')">
      配達完了
    </button>
  </div>

  <div class="eco-content">
    <!-- Summary -->
    <div class="eco-summary">
      <div class="eco-summary-card">
        <div class="eco-summary-num" id="eco-count-paid">-</div>
        <div class="eco-summary-label">未発送</div>
      </div>
      <div class="eco-summary-card">
        <div class="eco-summary-num" id="eco-count-shipped">-</div>
        <div class="eco-summary-label">発送済み</div>
      </div>
      <div class="eco-summary-card">
        <div class="eco-summary-num" id="eco-count-total">-</div>
        <div class="eco-summary-label">総注文数</div>
      </div>
    </div>

    <!-- Order List -->
    <div id="eco-list">
      <div class="eco-loading">読み込み中...</div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="eco-modal-overlay" id="eco-modal">
    <div class="eco-modal">
      <button class="eco-modal-close" onclick="ecoCloseModal()">&times;</button>
      <h3 id="eco-modal-title">注文詳細</h3>
      <div id="eco-modal-body"></div>
    </div>
  </div>

  <script>
  (function() {
    'use strict';

    var _ecoOrders = [];
    var _ecoCurrentFilter = 'all';
    var _ecoUnsubscribe = null;

    window.initEcOrdersPage = function() {
      ecoLoadOrders();
    };

    window.destroyEcOrdersPage = function() {
      if (_ecoUnsubscribe) {
        _ecoUnsubscribe();
        _ecoUnsubscribe = null;
      }
      _ecoOrders = [];
      document.removeEventListener('click', _ecoCloseMenuOnClick);
    };

    // Dropdown menu
    function _ecoCloseMenuOnClick(e) {
      var dd = document.getElementById('eco-dropdown');
      if (dd && !dd.contains(e.target) && !e.target.closest('.eco-sub-header-icon')) {
        dd.classList.remove('show');
      }
    }
    document.addEventListener('click', _ecoCloseMenuOnClick);

    window.ecoToggleMenu = function(e) {
      e.stopPropagation();
      var dd = document.getElementById('eco-dropdown');
      dd.classList.toggle('show');
    };

    window.ecoExportCSV = function() {
      document.getElementById('eco-dropdown').classList.remove('show');
      if (_ecoOrders.length === 0) { alert('エクスポートする注文がありません'); return; }

      var rows = [['注文番号', 'ステータス', '商品名', '金額', '顧客メール', '配送先名', '注文日', '配送業者', '追跡番号']];
      _ecoOrders.forEach(function(o) {
        var displayId = o.sessionId ? o.sessionId.substring(0, 24).toUpperCase() : o.id.substring(0, 8);
        var items = (o.items || []).map(function(it) { return it.name; }).join(' / ');
        var dateStr = '';
        if (o.createdAt && o.createdAt.toDate) {
          var d = o.createdAt.toDate();
          dateStr = d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate();
        }
        rows.push([
          displayId,
          ecoStatusLabel(o.status),
          items,
          o.amountTotal || 0,
          o.customerEmail || '',
          o.shippingName || '',
          dateStr,
          ecoCarrierLabel(o.carrier) || '',
          o.trackingNumber || ''
        ]);
      });

      var csv = rows.map(function(r) {
        return r.map(function(c) { return '"' + String(c).replace(/"/g, '""') + '"'; }).join(',');
      }).join('\n');
      var bom = '\uFEFF';
      var blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'ec-orders-' + new Date().toISOString().slice(0, 10) + '.csv';
      a.click();
      URL.revokeObjectURL(url);
    };

    function ecoLoadOrders() {
      var db = firebase.firestore();
      _ecoUnsubscribe = db.collection('orders')
        .orderBy('createdAt', 'desc')
        .onSnapshot(function(snap) {
          _ecoOrders = [];
          snap.forEach(function(doc) {
            var d = doc.data();
            d.id = doc.id;
            _ecoOrders.push(d);
          });
          ecoUpdateSummary();
          ecoRenderList();
        }, function(err) {
          console.error('[EC Orders] Load error:', err);
          document.getElementById('eco-list').innerHTML =
            '<div class="eco-empty"><i class="bi bi-exclamation-circle"></i>注文データの読み込みに失敗しました</div>';
        });
    }

    function ecoUpdateSummary() {
      var paid = 0, shipped = 0;
      _ecoOrders.forEach(function(o) {
        if (o.status === 'paid') paid++;
        else if (o.status === 'shipped') shipped++;
      });
      document.getElementById('eco-count-paid').textContent = paid;
      document.getElementById('eco-count-shipped').textContent = shipped;
      document.getElementById('eco-count-total').textContent = _ecoOrders.length;

      var badge = document.getElementById('eco-badge-paid');
      if (paid > 0) {
        badge.textContent = paid;
        badge.style.display = 'inline-block';
      } else {
        badge.style.display = 'none';
      }
    }

    function ecoRenderList() {
      var filtered = _ecoOrders;
      if (_ecoCurrentFilter !== 'all') {
        filtered = _ecoOrders.filter(function(o) { return o.status === _ecoCurrentFilter; });
      }

      var listEl = document.getElementById('eco-list');
      if (filtered.length === 0) {
        var msg = _ecoCurrentFilter === 'all' ? '注文はまだありません' : 'この状態の注文はありません';
        listEl.innerHTML = '<div class="eco-empty"><i class="bi bi-inbox"></i>' + msg + '</div>';
        return;
      }

      var html = '';
      filtered.forEach(function(order) {
        var itemNames = (order.items || []).map(function(it) { return it.name; }).join(', ') || '商品情報なし';
        var amount = order.amountTotal || 0;
        var dateStr = '';
        if (order.createdAt && order.createdAt.toDate) {
          var d = order.createdAt.toDate();
          dateStr = (d.getMonth() + 1) + '/' + d.getDate() + ' ' +
            ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
        }
        var statusClass = 'eco-status-' + (order.status || 'paid');
        var statusText = ecoStatusLabel(order.status);
        var orderId = order.sessionId ? order.sessionId.substring(0, 24).toUpperCase() : order.id.substring(0, 8);

        html += '<div class="eco-card" onclick="ecoShowDetail(\'' + order.id + '\')">';
        html += '<div class="eco-card-header">';
        html += '<span class="eco-order-id">#' + orderId + '</span>';
        html += '<span class="eco-status ' + statusClass + '">' + statusText + '</span>';
        html += '</div>';
        html += '<div class="eco-card-items">' + ecoEscapeHtml(itemNames) + '</div>';
        html += '<div class="eco-card-meta">';
        html += '<span>' + dateStr + '</span>';
        html += '<span class="eco-card-amount">&yen;' + amount.toLocaleString() + '</span>';
        html += '</div>';
        html += '</div>';
      });
      listEl.innerHTML = html;
    }

    window.ecoSwitchTab = function(filter) {
      _ecoCurrentFilter = filter;
      document.querySelectorAll('#spa-page-ec-orders .eco-tab').forEach(function(tab) {
        tab.classList.toggle('active', tab.getAttribute('data-filter') === filter);
      });
      ecoRenderList();
    };

    window.ecoShowDetail = function(orderId) {
      var order = _ecoOrders.find(function(o) { return o.id === orderId; });
      if (!order) return;

      var displayId = order.sessionId ? order.sessionId.substring(0, 24).toUpperCase() : order.id.substring(0, 8);
      document.getElementById('eco-modal-title').textContent = '注文 #' + displayId;

      var itemsHtml = '<ul class="eco-detail-items" style="list-style:none;padding:0;margin:0">';
      (order.items || []).forEach(function(item) {
        itemsHtml += '<li>' + ecoEscapeHtml(item.name || '') + ' &times;' + (item.quantity || 1) +
          ' <span style="float:right;font-weight:600">&yen;' + (item.amount || 0).toLocaleString() + '</span></li>';
      });
      itemsHtml += '</ul>';

      var dateStr = '';
      if (order.createdAt && order.createdAt.toDate) {
        var d = order.createdAt.toDate();
        dateStr = d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate() + ' ' +
          ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
      }

      var addr = order.shippingAddress || {};
      var addrText = [
        addr.postal_code ? '\u3012' + addr.postal_code : '',
        addr.state || '',
        addr.city || '',
        addr.line1 || '',
        addr.line2 || ''
      ].filter(Boolean).join(' ');

      var body = '';
      body += '<div class="eco-detail-section">';
      body += '<div class="eco-detail-label">STATUS</div>';
      body += '<div class="eco-detail-value"><span class="eco-status eco-status-' + (order.status || 'paid') + '">' + ecoStatusLabel(order.status) + '</span></div>';
      body += '</div>';

      body += '<div class="eco-detail-section">';
      body += '<div class="eco-detail-label">ORDER DATE</div>';
      body += '<div class="eco-detail-value">' + dateStr + '</div>';
      body += '</div>';

      body += '<div class="eco-detail-section">';
      body += '<div class="eco-detail-label">ITEMS</div>';
      body += '<div class="eco-detail-value">' + itemsHtml + '</div>';
      body += '<div style="text-align:right;font-size:16px;font-weight:700;margin-top:8px;padding-top:8px;border-top:2px solid #1f2937">&yen;' + (order.amountTotal || 0).toLocaleString() + '</div>';
      body += '</div>';

      body += '<div class="eco-detail-section">';
      body += '<div class="eco-detail-label">CUSTOMER</div>';
      body += '<div class="eco-detail-value">' + ecoEscapeHtml(order.customerEmail || '-') + '</div>';
      body += '</div>';

      body += '<div class="eco-detail-section">';
      body += '<div class="eco-detail-label">SHIPPING</div>';
      body += '<div class="eco-detail-value">' + ecoEscapeHtml(order.shippingName || '') + '<br>' + ecoEscapeHtml(addrText) + '</div>';
      body += '</div>';

      // Actions based on status
      if (order.status === 'paid') {
        body += '<div class="eco-ship-form">';
        body += '<label>配送業者</label>';
        body += '<select id="eco-carrier">';
        body += '<option value="yamato">ヤマト運輸</option>';
        body += '<option value="sagawa">佐川急便</option>';
        body += '<option value="jppost">日本郵便</option>';
        body += '<option value="other">その他</option>';
        body += '</select>';
        body += '<label>追跡番号</label>';
        body += '<input type="text" id="eco-tracking" placeholder="追跡番号を入力" inputmode="numeric">';
        body += '<button class="eco-btn-ship" id="eco-btn-ship" onclick="ecoProcessShip(\'' + order.id + '\')">発送処理を実行</button>';
        body += '</div>';
      } else if (order.status === 'shipped') {
        var shipInfo = '';
        if (order.shippedAt && order.shippedAt.toDate) {
          var sd = order.shippedAt.toDate();
          shipInfo += '発送日: ' + sd.getFullYear() + '/' + (sd.getMonth() + 1) + '/' + sd.getDate();
        }
        if (order.carrier) shipInfo += '<br>配送業者: ' + ecoCarrierLabel(order.carrier);
        if (order.trackingNumber) shipInfo += '<br>追跡番号: ' + ecoEscapeHtml(order.trackingNumber);

        body += '<div class="eco-shipped-info">' + shipInfo + '</div>';
        body += '<button class="eco-btn-delivered" onclick="ecoMarkDelivered(\'' + order.id + '\')">配達完了にする</button>';
      } else if (order.status === 'delivered') {
        var delInfo = '';
        if (order.carrier) delInfo += '配送業者: ' + ecoCarrierLabel(order.carrier);
        if (order.trackingNumber) delInfo += '<br>追跡番号: ' + ecoEscapeHtml(order.trackingNumber);
        if (order.deliveredAt && order.deliveredAt.toDate) {
          var dd = order.deliveredAt.toDate();
          delInfo += '<br>配達完了: ' + dd.getFullYear() + '/' + (dd.getMonth() + 1) + '/' + dd.getDate();
        }
        if (delInfo) body += '<div class="eco-shipped-info">' + delInfo + '</div>';
      }

      document.getElementById('eco-modal-body').innerHTML = body;
      document.getElementById('eco-modal').classList.add('show');
    };

    window.ecoCloseModal = function() {
      document.getElementById('eco-modal').classList.remove('show');
    };

    window.ecoProcessShip = function(orderId) {
      var carrier = document.getElementById('eco-carrier').value;
      var tracking = (document.getElementById('eco-tracking').value || '').trim();

      var btn = document.getElementById('eco-btn-ship');
      btn.disabled = true;
      btn.textContent = '処理中...';

      var db = firebase.firestore();
      db.collection('orders').doc(orderId).update({
        status: 'shipped',
        carrier: carrier,
        trackingNumber: tracking,
        shippedAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(function() {
        ecoCloseModal();
        ecoAutoCompleteShipTask(orderId);
      }).catch(function(err) {
        console.error('[EC Orders] Ship error:', err);
        alert('発送処理に失敗しました: ' + err.message);
        btn.disabled = false;
        btn.textContent = '発送処理を実行';
      });
    };

    window.ecoMarkDelivered = function(orderId) {
      if (!confirm('この注文を配達完了にしますか？')) return;
      var db = firebase.firestore();
      db.collection('orders').doc(orderId).update({
        status: 'delivered',
        deliveredAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(function() {
        ecoCloseModal();
      }).catch(function(err) {
        console.error('[EC Orders] Deliver error:', err);
        alert('更新に失敗しました: ' + err.message);
      });
    };

    // Auto-complete EC order tasks when shipped
    function ecoAutoCompleteShipTask(orderId) {
      var db = firebase.firestore();
      var user = firebase.auth().currentUser;
      if (!user || !user.email) return;

      db.collection('userTasks').doc(user.email).collection('tasks')
        .where('type', '==', 'ec_order')
        .where('completed', '==', false)
        .get()
        .then(function(snap) {
          snap.forEach(function(doc) {
            var data = doc.data();
            if (data.relatedData && data.relatedData.orderId === orderId) {
              doc.ref.update({ completed: true });
            }
          });
        })
        .catch(function(err) {
          console.error('[EC Orders] Auto-complete task error:', err);
        });
    }

    function ecoStatusLabel(status) {
      switch (status) {
        case 'paid': return '未発送';
        case 'shipped': return '発送済み';
        case 'delivered': return '配達完了';
        default: return status || '不明';
      }
    }

    function ecoCarrierLabel(carrier) {
      switch (carrier) {
        case 'yamato': return 'ヤマト運輸';
        case 'sagawa': return '佐川急便';
        case 'jppost': return '日本郵便';
        case 'other': return 'その他';
        default: return carrier || '';
      }
    }

    function ecoEscapeHtml(str) {
      if (!str) return '';
      var d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }
  })();
  </script>
</div>
