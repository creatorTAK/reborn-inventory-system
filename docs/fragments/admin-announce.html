  </style>

  <!-- アクセス拒否画面 -->
  <div id="adann-accessDenied" style="display: none;">
    <div class="adann-header">
      <button class="adann-header-back" onclick="adannGoBack()" title="戻る"><i class="bi bi-chevron-left"></i></button>
      <h1>アクセス制限</h1>

      <i class="bi bi-x-circle"></i>
      <h2>アクセスが拒否されました</h2>
      <p>このページは管理者専用です。<br>権限のあるアカウントでログインしてください。</p>
    </div>
  </div>

  <!-- 管理画面 -->
  <div id="adann-adminContent" style="display: none;">
    <div class="adann-header">
      <button class="adann-header-back" onclick="adannGoBack()" title="戻る"><i class="bi bi-chevron-left"></i></button>
      <h1>お知らせ管理</h1>
    </div>

    <div class="adann-content-container">
      <!-- 統計 -->
      <div class="adann-stats-row">
        <div class="adann-stat-box">
          <div class="adann-stat-value" id="adann-statTotal">0</div>
          <div class="adann-stat-label">全投稿数</div>
        </div>
        <div class="adann-stat-box">
          <div class="adann-stat-value" id="adann-statActive">0</div>
          <div class="adann-stat-label">公開中</div>
        </div>
      </div>

      <!-- 新規投稿 -->
      <div class="adann-card">
        <h3><i class="bi bi-plus-circle"></i> 新規お知らせ投稿</h3>
        <form id="adann-form">
          <div class="mb-3">
            <label class="form-label">タイトル</label>
            <input type="text" class="form-control" id="adann-title" placeholder="お知らせのタイトル" required>
          </div>
          <div class="mb-3">
            <label class="form-label">本文</label>
            <textarea class="form-control" id="adann-body" placeholder="お知らせの内容を入力..." required></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">重要度</label>
            <small class="text-muted d-block mb-2">※「重要」を選択するとプッシュ通知が送信されます</small>
            <div class="adann-priority-selector">
              <button type="button" class="adann-priority-btn info active" data-priority="info">
                <i class="bi bi-info-circle"></i> 通常
              </button>
              <button type="button" class="adann-priority-btn warning" data-priority="warning">
                <i class="bi bi-exclamation-triangle"></i> 注意
              </button>
              <button type="button" class="adann-priority-btn danger" data-priority="danger">
                <i class="bi bi-exclamation-circle"></i> 重要
              </button>
            </div>
          </div>
          <button type="submit" class="adann-btn-submit" id="adann-submitBtn">
            <i class="bi bi-send"></i> 投稿する
          </button>
        </form>
      </div>

      <!-- 投稿一覧 -->
      <div class="adann-card">
        <h3><i class="bi bi-list-ul"></i> 投稿一覧</h3>
        <div id="adann-list">
          <div class="adann-empty-state">
            <i class="bi bi-megaphone"></i>
            <div>お知らせはまだありません</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
  (function() {
    var db = window.firebaseDB;
    var collection = window.firestoreCollection;
    var doc = window.firestoreDoc;
    var getDocs = window.firestoreGetDocs;
    var addDoc = window.firestoreAddDoc;
    var deleteDoc = window.firestoreDeleteDoc;
    var serverTimestamp = window.firestoreServerTimestamp;
    var query = window.firestoreQuery;
    var orderBy = window.firestoreOrderBy;

    var ADMIN_EMAILS = [
      'mercari.yasuhirotakuji@gmail.com'
    ];

    var WORKER_URL = 'https://reborn-webhook-worker.mercari-yasuhirotakuji.workers.dev';

    var _adannAnnouncements = [];
    var _adannSelectedPriority = 'info';

    function initAdminAnnouncePage() {
      var userEmail = localStorage.getItem('reborn_user_email');

      if (!userEmail || !ADMIN_EMAILS.includes(userEmail)) {
        document.getElementById('adann-accessDenied').style.display = 'block';
        document.getElementById('adann-adminContent').style.display = 'none';
        console.log('アクセス拒否: ', userEmail);
        return;
      }

      document.getElementById('adann-accessDenied').style.display = 'none';
      document.getElementById('adann-adminContent').style.display = 'block';

      _adannSelectedPriority = 'info';
      adannSetupEventListeners();
      adannLoadAnnouncements();
    }

    function destroyAdminAnnouncePage() {
      _adannAnnouncements = [];
      _adannSelectedPriority = 'info';
    }

    function adannSetupEventListeners() {
      var scope = document.getElementById('spa-page-admin-announce');
      scope.querySelectorAll('.adann-priority-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          scope.querySelectorAll('.adann-priority-btn').forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          _adannSelectedPriority = btn.dataset.priority;
        });
      });

      document.getElementById('adann-form').addEventListener('submit', function(e) {
        e.preventDefault();
        adannSubmitAnnouncement();
      });
    }

    async function adannLoadAnnouncements() {
      try {
        var announcementsRef = collection(db, 'announcements');
        var snapshot = await getDocs(announcementsRef);

        _adannAnnouncements = [];
        snapshot.forEach(function(docSnap) {
          _adannAnnouncements.push({ id: docSnap.id, ...docSnap.data() });
        });

        _adannAnnouncements.sort(function(a, b) {
          var dateA = a.createdAt?.toDate?.() || new Date(a.createdAt) || new Date(0);
          var dateB = b.createdAt?.toDate?.() || new Date(b.createdAt) || new Date(0);
          return dateB - dateA;
        });

        adannUpdateStats();
        adannRenderAnnouncements();
      } catch (error) {
        console.error('お知らせ読み込みエラー:', error);
        alert('お知らせの読み込みに失敗しました');
      }
    }

    function adannUpdateStats() {
      document.getElementById('adann-statTotal').textContent = _adannAnnouncements.length;
      document.getElementById('adann-statActive').textContent = _adannAnnouncements.length;
    }

    function adannRenderAnnouncements() {
      var container = document.getElementById('adann-list');

      if (_adannAnnouncements.length === 0) {
        container.innerHTML = '<div class="adann-empty-state"><i class="bi bi-megaphone"></i><div>お知らせはまだありません</div></div>';
        return;
      }

      var iconMap = {
        info: 'bi-info-circle',
        warning: 'bi-exclamation-triangle',
        danger: 'bi-exclamation-circle'
      };

      container.innerHTML = _adannAnnouncements.map(function(item) {
        var date = item.createdAt?.toDate?.() || new Date(item.createdAt) || new Date();
        var dateStr = date.toLocaleDateString('ja-JP', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        var priority = item.priority || 'info';

        return '<div class="adann-item">' +
          '<div class="adann-icon ' + priority + '"><i class="bi ' + iconMap[priority] + '"></i></div>' +
          '<div class="adann-content">' +
            '<div class="adann-title">' + adannEscapeHtml(item.title) + '</div>' +
            '<div class="adann-body">' + adannEscapeHtml(item.body) + '</div>' +
            '<div class="adann-meta">' + dateStr + '</div>' +
          '</div>' +
          '<div class="adann-actions">' +
            '<button class="delete" onclick="adannDeleteAnnouncement(\'' + item.id + '\')" title="削除"><i class="bi bi-trash"></i></button>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    async function adannSubmitAnnouncement() {
      var title = document.getElementById('adann-title').value.trim();
      var body = document.getElementById('adann-body').value.trim();

      if (!title || !body) {
        alert('タイトルと本文を入力してください');
        return;
      }

      var submitBtn = document.getElementById('adann-submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> 投稿中...';

      try {
        await addDoc(collection(db, 'announcements'), {
          title: title,
          body: body,
          priority: _adannSelectedPriority,
          createdAt: serverTimestamp()
        });

        var wasDanger = _adannSelectedPriority === 'danger';
        if (wasDanger) {
          submitBtn.innerHTML = '<i class="bi bi-bell"></i> 通知送信中...';
          try {
            var userEmail = localStorage.getItem('reborn_user_email');
            console.log('プッシュ通知送信開始:', { title: title, userEmail: userEmail });
            var response = await fetch(WORKER_URL + '/api/announce/broadcast', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                title: '❗ ' + title,
                message: body,
                adminEmail: userEmail
              })
            });
            console.log('Worker応答ステータス:', response.status);
            var result = await response.json();
            console.log('Worker応答:', result);
            if (result.success) {
              console.log('プッシュ通知送信完了: ' + result.sentCount + '件');
            } else {
              console.error('プッシュ通知送信失敗:', result.error);
            }
          } catch (pushError) {
            console.error('プッシュ通知送信エラー:', pushError);
          }
        }

        // フォームリセット
        document.getElementById('adann-form').reset();
        var scope = document.getElementById('spa-page-admin-announce');
        scope.querySelectorAll('.adann-priority-btn').forEach(function(b) { b.classList.remove('active'); });
        scope.querySelector('.adann-priority-btn.info').classList.add('active');
        _adannSelectedPriority = 'info';

        await adannLoadAnnouncements();

        var alertMessage = wasDanger
          ? 'お知らせを投稿し、プッシュ通知を送信しました'
          : 'お知らせを投稿しました';
        alert(alertMessage);
      } catch (error) {
        console.error('投稿エラー:', error);
        alert('投稿に失敗しました: ' + error.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="bi bi-send"></i> 投稿する';
      }
    }

    function adannEscapeHtml(str) {
      if (!str) return '';
      var map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return str.replace(/[&<>"']/g, function(c) { return map[c]; });
    }

    function adannGoBack() {
      if (typeof spaGoBack === 'function') {
        spaGoBack();
      } else {
        window.location.href = '/';
      }
    }

    // グローバル公開
    window.initAdminAnnouncePage = initAdminAnnouncePage;
    window.destroyAdminAnnouncePage = destroyAdminAnnouncePage;
    window.adannGoBack = adannGoBack;
    window.adannDeleteAnnouncement = async function(id) {
      if (!confirm('このお知らせを削除しますか？')) return;
      try {
        await deleteDoc(doc(db, 'announcements', id));
        await adannLoadAnnouncements();
        alert('削除しました');
      } catch (error) {
        console.error('削除エラー:', error);
        alert('削除に失敗しました: ' + error.message);
      }
    };
  })();
  </script>
</div>
