<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FURIRA - カート</title>
  <meta name="description" content="FURIRA(フリラ) - ショッピングカート">
  <link rel="icon" href="/images/furira-square-logo.png">
  <meta name="robots" content="noindex, nofollow">
  <!-- Preconnect hints -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="dns-prefetch" href="https://firestore.googleapis.com">
  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-4C6R9CZRVL"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-4C6R9CZRVL');</script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Noto+Sans+JP:wght@300;400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-warm: #F5F2ED;
      --bg-card: #FFFFFF;
      --blue-primary: #4A7FB5;
      --blue-dark: #3A6A9B;
      --blue-light: #E8F0F8;
      --craft-brown: #C4956A;
      --craft-light: #E8D5C0;
      --text-primary: #2C2C2C;
      --text-secondary: #6B6560;
      --text-light: #9B9590;
      --sold-red: #B54A4A;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --radius: 4px;
    }

    html, body {
      overflow-x: hidden;
      max-width: 100%;
    }

    body {
      font-family: 'Noto Sans JP', 'Inter', sans-serif;
      background: var(--bg-warm);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ======================================
       HEADER
    ====================================== */
    .shop-header {
      background: var(--bg-card);
      border-bottom: 1px solid rgba(0,0,0,0.06);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .shop-header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .shop-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text-primary);
    }

    .shop-logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--blue-primary);
    }

    .shop-logo-sub {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--text-light);
      text-transform: uppercase;
      margin-top: -2px;
    }

    .shop-nav {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .shop-nav a {
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.5px;
      transition: color 0.2s;
    }

    .shop-nav a:hover { color: var(--blue-primary); }

    .shop-nav-icon {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 20px;
      padding: 4px;
      transition: color 0.2s;
      position: relative;
    }

    .shop-nav-icon:hover { color: var(--blue-primary); }
    .shop-nav-icon.active-page { color: var(--blue-primary); }

    .cart-badge {
      position: absolute;
      top: -4px;
      right: -6px;
      background: var(--blue-primary);
      color: white;
      font-size: 10px;
      font-weight: 600;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
    }

    /* ======================================
       CART CONTAINER
    ====================================== */
    .cart-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    .cart-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .cart-subtitle {
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 24px;
    }

    /* ======================================
       CART ITEMS
    ====================================== */
    .cart-items {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .cart-item {
      display: flex;
      gap: 16px;
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.2s;
    }

    .cart-item:hover {
      box-shadow: var(--shadow-md);
    }

    .cart-item-img {
      width: 100px;
      height: 100px;
      border-radius: var(--radius);
      overflow: hidden;
      flex-shrink: 0;
      cursor: pointer;
    }

    .cart-item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cart-item-details {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .cart-item-brand {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-light);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .cart-item-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cart-item-size {
      font-size: 11px;
      color: var(--text-light);
      margin-bottom: 6px;
    }

    .cart-item-price {
      display: inline-flex;
      align-items: center;
      background: var(--craft-light);
      color: var(--craft-brown);
      padding: 3px 10px;
      border-radius: 2px;
      font-size: 14px;
      font-weight: 600;
      position: relative;
      align-self: flex-start;
    }

    .cart-item-price::before {
      content: '';
      position: absolute;
      left: -4px;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      background: var(--bg-warm);
      border-radius: 50%;
    }

    .cart-item-actions {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .cart-item-remove {
      background: none;
      border: 1px solid #e0dbd5;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-light);
      font-size: 16px;
      transition: all 0.2s;
    }

    .cart-item-remove:hover {
      border-color: var(--sold-red);
      color: var(--sold-red);
      background: #FFF5F5;
    }

    /* ======================================
       CART SUMMARY
    ====================================== */
    .cart-summary {
      margin-top: 24px;
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow-sm);
    }

    .cart-summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .cart-summary-row:last-of-type {
      margin-bottom: 0;
    }

    .cart-summary-divider {
      height: 1px;
      background: #E8E4DE;
      margin: 16px 0;
    }

    .cart-summary-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .cart-summary-note {
      font-size: 11px;
      color: var(--text-light);
      margin-top: 8px;
    }

    .cart-checkout-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: var(--blue-primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 20px;
    }

    .cart-checkout-btn:hover { background: var(--blue-dark); }
    .cart-checkout-btn:active { transform: scale(0.98); }

    .cart-checkout-btn:disabled {
      background: #C5C0BA;
      cursor: not-allowed;
    }

    .cart-continue-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
      font-size: 13px;
      color: var(--text-light);
      text-decoration: none;
      transition: color 0.2s;
    }

    .cart-continue-link:hover { color: var(--blue-primary); }

    /* ======================================
       CART EMPTY STATE
    ====================================== */
    .cart-empty {
      text-align: center;
      padding: 60px 20px;
    }

    .cart-empty-icon {
      font-size: 48px;
      color: #e0dbd5;
      margin-bottom: 16px;
    }

    .cart-empty-text {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .cart-empty-sub {
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 24px;
    }

    .cart-empty-btn {
      display: inline-block;
      padding: 12px 32px;
      background: var(--blue-primary);
      color: white;
      text-decoration: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .cart-empty-btn:hover { background: var(--blue-dark); }

    /* ======================================
       LOADING
    ====================================== */
    .cart-loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }

    .cart-loading-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid #e0dbd5;
      border-top-color: var(--blue-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Sold-out item overlay */
    .cart-item-unavailable {
      opacity: 0.5;
      position: relative;
    }

    .cart-item-unavailable-label {
      font-size: 11px;
      color: var(--sold-red);
      font-weight: 500;
      margin-top: 4px;
    }

    /* ======================================
       FOOTER
    ====================================== */
    .shop-footer {
      background: var(--text-primary);
      color: rgba(255,255,255,0.5);
      text-align: center;
      padding: 32px 20px;
      font-size: 11px;
      letter-spacing: 1px;
    }

    .shop-footer-logo {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 3px;
      margin-bottom: 8px;
    }

    .shop-footer-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 16px;
    }

    .shop-footer-links a {
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      font-size: 11px;
      transition: color 0.2s;
    }

    .shop-footer-links a:hover { color: rgba(255,255,255,0.8); }

    /* ======================================
       RESPONSIVE
    ====================================== */
    @media (max-width: 768px) {
      .shop-header-inner { height: 56px; }
      .shop-logo-text { font-size: 18px; }
      .shop-nav a.nav-text { display: none; }

      .cart-container { padding: 20px 16px 40px; }
      .cart-title { font-size: 18px; }

      .cart-item { padding: 12px; gap: 12px; }
      .cart-item-img { width: 80px; height: 80px; }
      .cart-item-name { font-size: 13px; }
      .cart-item-price { font-size: 13px; }
      .cart-item-remove { width: 38px; height: 38px; }
    }

    @media (max-width: 480px) {
      .cart-container { padding: 16px 12px 32px; }
      .cart-item-img { width: 72px; height: 72px; }
      .cart-item-brand { font-size: 9px; }
      .cart-item-name { font-size: 12px; }
      .cart-summary { padding: 16px; }
      .cart-summary-total { font-size: 16px; }
      .cart-checkout-btn { font-size: 14px; padding: 14px; }
      .shop-footer-links { flex-wrap: wrap; gap: 12px 20px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="shop-header">
    <div class="shop-header-inner">
      <a href="/shop/" class="shop-logo">
        <div>
          <div class="shop-logo-text">FURIRA</div>
          <div class="shop-logo-sub">vintage & used</div>
        </div>
      </a>
      <nav class="shop-nav">
        <a href="/shop/" class="nav-text">Shop</a>
        <a href="/shop/#about" class="nav-text">About</a>
        <button class="shop-nav-icon" onclick="location.href='/shop/favorites.html'" aria-label="お気に入り">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
          </svg>
        </button>
        <button class="shop-nav-icon active-page" onclick="location.reload()" aria-label="Cart">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"></path>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <path d="M16 10a4 4 0 01-8 0"></path>
          </svg>
          <span class="cart-badge" id="cartBadge">0</span>
        </button>
      </nav>
    </div>
  </header>

  <!-- CART CONTENT -->
  <div class="cart-container">
    <h1 class="cart-title">ショッピングカート</h1>
    <div class="cart-subtitle" id="cartSubtitle"></div>

    <!-- Loading -->
    <div class="cart-loading" id="cartLoading">
      <div class="cart-loading-spinner"></div>
      <div>読み込み中...</div>
    </div>

    <!-- Empty state (hidden by default) -->
    <div class="cart-empty" id="cartEmpty" style="display: none;">
      <div class="cart-empty-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"></path>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <path d="M16 10a4 4 0 01-8 0"></path>
        </svg>
      </div>
      <div class="cart-empty-text">カートに商品がありません</div>
      <div class="cart-empty-sub">気になるアイテムを見つけてカートに追加しましょう</div>
      <a href="/shop/" class="cart-empty-btn">商品を探す</a>
    </div>

    <!-- Cart items (hidden by default) -->
    <div id="cartContent" style="display: none;">
      <div class="cart-items" id="cartItems"></div>

      <div class="cart-summary">
        <div class="cart-summary-row">
          <span>小計</span>
          <span id="cartSubtotal"></span>
        </div>
        <div class="cart-summary-row">
          <span>送料</span>
          <span id="cartShipping">購入手続きで計算</span>
        </div>
        <div class="cart-summary-divider"></div>
        <div class="cart-summary-total">
          <span>合計</span>
          <span id="cartTotal"></span>
        </div>
        <div class="cart-summary-note">※ 送料は購入手続き時に確定します</div>
        <div class="cart-summary-note">※ クーポンコードをお持ちの方はレジ画面で入力できます</div>

        <button class="cart-checkout-btn" id="cartCheckoutBtn" onclick="cartCheckout()">
          レジに進む
        </button>
      </div>

      <a href="/shop/" class="cart-continue-link">&#8592; 買い物を続ける</a>
    </div>

  <!-- FOOTER -->
  <footer class="shop-footer">
    <div class="shop-footer-logo">FURIRA</div>
    <div class="shop-footer-links">
      <a href="/shop/">Shop</a>
      <a href="/shop/#about">About</a>
      <a href="/shop/legal.html">特定商取引法</a>
      <a href="/shop/privacy.html">プライバシーポリシー</a>
    </div>
    <div>&copy; 2026 FURIRA. All rights reserved.</div>
  </footer>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="/shop/cart-utils.js"></script>

  <script>
    // ============================================
    // Firebase Init
    // ============================================
    firebase.initializeApp({
      apiKey: "AIzaSyCe-mj6xoV1HbHkIOVqeHCjKjwwtCorUZQ",
      authDomain: "furira.jp",
      projectId: "reborn-chat",
      storageBucket: "reborn-chat.firebasestorage.app",
      messagingSenderId: "345706548795",
      appId: "1:345706548795:web:058a553da6b4b74db5161e"
    });
    var cartDb = firebase.firestore();

    // ============================================
    // State
    // ============================================
    var cartProducts = []; // fetched product data

    // ============================================
    // Init
    // ============================================
    async function cartInit() {
      FuriraCart.updateBadge();

      var cartIds = FuriraCart.get();
      if (cartIds.length === 0) {
        cartShowEmpty();
        return;
      }

      document.getElementById('cartSubtitle').textContent = cartIds.length + ' 点のアイテム';

      try {
        // Fetch product details for each cart item
        var promises = cartIds.map(function(id) {
          return cartDb.collection('products').doc(id).get();
        });
        var docs = await Promise.all(promises);

        cartProducts = [];
        var removedIds = [];

        docs.forEach(function(doc, i) {
          if (!doc.exists) {
            removedIds.push(cartIds[i]);
            return;
          }
          var data = doc.data();
          var images = [];
          if (data.images && Array.isArray(data.images) && data.images.length > 0) {
            images = data.images;
          } else if (data.images && data.images.imageUrls && data.images.imageUrls.length > 0) {
            images = data.images.imageUrls;
          } else {
            images = [data.imageUrl1, data.imageUrl2, data.imageUrl3].filter(Boolean);
          }

          var brand = (typeof data.brand === 'object' && data.brand !== null)
            ? (data.brand.name || data.brand.label || '') : (data.brand || '');
          var size = (typeof data.size === 'object' && data.size !== null)
            ? (data.size.display || data.size.actual || '') : (data.size || '');

          var isSold = data.status === '販売済み' || data.status === '販売済';

          cartProducts.push({
            id: doc.id,
            name: data.productName || '',
            brand: brand,
            price: data.listingAmount || 0,
            saleAmount: data.saleAmount || 0,
            images: images,
            size: size,
            status: data.status || '',
            isSold: isSold
          });
        });

        // Remove products that no longer exist
        removedIds.forEach(function(id) { FuriraCart.remove(id); });

        if (cartProducts.length === 0) {
          cartShowEmpty();
          return;
        }

        cartRender();
      } catch (error) {
        console.error('[Cart] Error:', error);
        document.getElementById('cartLoading').innerHTML =
          '<div style="color: var(--sold-red);">カートの読み込みに失敗しました</div>';
      }
    }

    // ============================================
    // Render
    // ============================================
    function cartRender() {
      var itemsHtml = '';
      var subtotal = 0;
      var availableCount = 0;

      cartProducts.forEach(function(p) {
        var imgSrc = p.images.length > 0 ? p.images[0] : '';
        var displayPrice = p.price || p.saleAmount || 0;
        var unavailableClass = p.isSold ? ' cart-item-unavailable' : '';

        if (!p.isSold) {
          subtotal += displayPrice;
          availableCount++;
        }

        itemsHtml += '<div class="cart-item' + unavailableClass + '" data-id="' + p.id + '">';
        itemsHtml += '<div class="cart-item-img" onclick="location.href=\'/shop/item.html?id=' + p.id + '\'">';
        if (imgSrc) {
          itemsHtml += '<img src="' + imgSrc + '" alt="' + cartEscape(p.name) + '" loading="lazy">';
        }
        itemsHtml += '</div>';
        itemsHtml += '<div class="cart-item-details">';
        if (p.brand) {
          itemsHtml += '<div class="cart-item-brand">' + cartEscape(p.brand) + '</div>';
        }
        itemsHtml += '<div class="cart-item-name">' + cartEscape(p.name) + '</div>';
        if (p.size) {
          itemsHtml += '<div class="cart-item-size">Size: ' + cartEscape(p.size) + '</div>';
        }
        if (displayPrice > 0) {
          itemsHtml += '<span class="cart-item-price">&yen;' + Number(displayPrice).toLocaleString() + '</span>';
        }
        if (p.isSold) {
          itemsHtml += '<div class="cart-item-unavailable-label">この商品は売り切れました</div>';
        }
        itemsHtml += '</div>';
        itemsHtml += '<div class="cart-item-actions">';
        itemsHtml += '<button class="cart-item-remove" onclick="cartRemoveItem(\'' + p.id + '\')" title="削除">&times;</button>';
        itemsHtml += '</div>';
        itemsHtml += '</div>';
      });

      document.getElementById('cartItems').innerHTML = itemsHtml;
      document.getElementById('cartSubtotal').textContent = '\u00a5' + Number(subtotal).toLocaleString();
      document.getElementById('cartTotal').textContent = '\u00a5' + Number(subtotal).toLocaleString();
      document.getElementById('cartSubtitle').textContent = cartProducts.length + ' 点のアイテム';

      // Disable checkout if no available items
      var checkoutBtn = document.getElementById('cartCheckoutBtn');
      if (availableCount === 0) {
        checkoutBtn.disabled = true;
        checkoutBtn.textContent = '購入可能な商品がありません';
      }

      document.getElementById('cartLoading').style.display = 'none';
      document.getElementById('cartContent').style.display = '';
    }

    // ============================================
    // Actions
    // ============================================
    function cartRemoveItem(productId) {
      FuriraCart.remove(productId);
      cartProducts = cartProducts.filter(function(p) { return p.id !== productId; });

      if (cartProducts.length === 0) {
        cartShowEmpty();
      } else {
        cartRender();
      }
    }

    async function cartCheckout() {
      // Filter out sold items
      var availableProducts = cartProducts.filter(function(p) { return !p.isSold; });
      if (availableProducts.length === 0) return;

      var btn = document.getElementById('cartCheckoutBtn');
      btn.disabled = true;
      btn.textContent = '処理中...';

      try {
        var itemIds = availableProducts.map(function(p) { return p.id; });

        var response = await fetch('https://asia-northeast1-reborn-chat.cloudfunctions.net/createCheckoutSession', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({items: itemIds}),
        });

        var result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || 'Checkout failed');
        }

        // Remove unavailable items from cart
        if (result.unavailable && result.unavailable.length > 0) {
          result.unavailable.forEach(function(id) { FuriraCart.remove(id); });
        }

        // Redirect to Stripe Checkout
        window.location.href = result.url;
      } catch (error) {
        console.error('[Cart] Checkout error:', error);
        btn.disabled = false;
        btn.textContent = 'レジに進む';
        alert('決済の開始に失敗しました。もう一度お試しください。');
      }
    }

    // ============================================
    // Helpers
    // ============================================
    function cartShowEmpty() {
      document.getElementById('cartLoading').style.display = 'none';
      document.getElementById('cartContent').style.display = 'none';
      document.getElementById('cartEmpty').style.display = '';
      document.getElementById('cartSubtitle').textContent = '';
    }

    function cartEscape(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ============================================
    // Start
    // ============================================
    cartInit();
  </script>
</body>
</html>
