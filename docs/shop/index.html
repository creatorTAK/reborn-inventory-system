<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FURIRA - Vintage & Used Clothing</title>
  <meta name="description" content="FURIRA(フリラ) - 厳選された古着・ヴィンテージアイテムをお届けするオンラインショップ">
  <link rel="icon" href="/images/furira-square-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-warm: #F5F2ED;
      --bg-card: #FFFFFF;
      --blue-primary: #4A7FB5;
      --blue-dark: #3A6A9B;
      --blue-light: #E8F0F8;
      --craft-brown: #C4956A;
      --craft-light: #E8D5C0;
      --text-primary: #2C2C2C;
      --text-secondary: #6B6560;
      --text-light: #9B9590;
      --sold-red: #B54A4A;
      --new-green: #5B8A5A;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.10);
      --radius: 4px;
    }

    body {
      font-family: 'Noto Sans JP', 'Inter', sans-serif;
      background: var(--bg-warm);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ======================================
       HEADER - ショップロゴ + ナビ
    ====================================== */
    .shop-header {
      background: var(--bg-card);
      border-bottom: 1px solid rgba(0,0,0,0.06);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .shop-header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .shop-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text-primary);
    }

    .shop-logo img {
      height: 36px;
      width: auto;
    }

    .shop-logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--blue-primary);
    }

    .shop-logo-sub {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--text-light);
      text-transform: uppercase;
      margin-top: -2px;
    }

    .shop-nav {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .shop-nav a {
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.5px;
      transition: color 0.2s;
    }

    .shop-nav a:hover {
      color: var(--blue-primary);
    }

    .shop-nav-icon {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 20px;
      padding: 4px;
      transition: color 0.2s;
      position: relative;
    }

    .shop-nav-icon:hover { color: var(--blue-primary); }

    .cart-badge {
      position: absolute;
      top: -4px;
      right: -6px;
      background: var(--blue-primary);
      color: white;
      font-size: 10px;
      font-weight: 600;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
    }

    /* ======================================
       HERO - ヒーローセクション
    ====================================== */
    .shop-hero {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 20px 24px;
      text-align: center;
    }

    .shop-hero-catch {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .shop-hero-sub {
      font-size: 13px;
      color: var(--text-secondary);
      letter-spacing: 1px;
      font-weight: 300;
    }

    .shop-hero-line {
      width: 40px;
      height: 2px;
      background: var(--craft-brown);
      margin: 20px auto 0;
    }

    /* ======================================
       FILTER BAR
    ====================================== */
    .shop-filter-bar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 20px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .shop-filter-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .shop-filter-tag {
      padding: 6px 16px;
      border: 1px solid #D5D0CA;
      border-radius: 20px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }

    .shop-filter-tag:hover {
      border-color: var(--blue-primary);
      color: var(--blue-primary);
    }

    .shop-filter-tag.active {
      background: var(--blue-primary);
      border-color: var(--blue-primary);
      color: white;
    }

    .shop-item-count {
      font-size: 12px;
      color: var(--text-light);
      letter-spacing: 0.5px;
    }

    /* ======================================
       MASONRY GRID - 商品一覧
    ====================================== */
    .shop-grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 20px 60px;
      columns: 4 240px;
      column-gap: 16px;
    }

    /* ======================================
       PRODUCT CARD - 商品カード
    ====================================== */
    .shop-card {
      break-inside: avoid;
      margin-bottom: 16px;
      background: var(--bg-card);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow: var(--shadow-sm);
      position: relative;
    }

    .shop-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }

    /* ポラロイド風フレーム */
    .shop-card-img-wrap {
      position: relative;
      overflow: hidden;
      background: #f0ece6;
    }

    .shop-card-img-wrap img {
      width: 100%;
      display: block;
      transition: transform 0.4s ease;
    }

    .shop-card:hover .shop-card-img-wrap img {
      transform: scale(1.03);
    }

    /* NEW バッジ - スタンプ風 */
    .shop-badge-new {
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--new-green);
      color: white;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-radius: 2px;
      transform: rotate(-3deg);
      box-shadow: 1px 1px 3px rgba(0,0,0,0.15);
    }

    /* SOLD バッジ - スタンプ風 */
    .shop-badge-sold {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-12deg);
      border: 3px solid var(--sold-red);
      color: var(--sold-red);
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      padding: 4px 20px;
      letter-spacing: 4px;
      text-transform: uppercase;
      border-radius: 4px;
      opacity: 0.85;
      background: rgba(255,255,255,0.7);
      pointer-events: none;
    }

    .shop-card-info {
      padding: 12px 14px 14px;
    }

    .shop-card-brand {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-light);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .shop-card-name {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 8px;
    }

    /* タグ風価格表示 */
    .shop-card-price-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--craft-light);
      color: var(--craft-brown);
      padding: 4px 12px;
      border-radius: 2px;
      font-size: 14px;
      font-weight: 600;
      position: relative;
    }

    .shop-card-price-tag::before {
      content: '';
      position: absolute;
      left: -4px;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      background: var(--bg-warm);
      border-radius: 50%;
    }

    .shop-card-size {
      display: inline-block;
      margin-left: 8px;
      font-size: 11px;
      color: var(--text-light);
      border: 1px solid #e0dbd5;
      padding: 1px 8px;
      border-radius: 2px;
    }

    .shop-card-condition {
      margin-top: 6px;
      font-size: 11px;
      color: var(--text-light);
    }

    /* Favorite heart button */
    .shop-card-fav {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.85);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      transition: all 0.2s;
      z-index: 2;
    }

    .shop-card-fav:hover { background: white; transform: scale(1.1); }

    .shop-card-fav svg {
      width: 16px;
      height: 16px;
      stroke: var(--text-light);
      fill: none;
      stroke-width: 2;
      transition: all 0.2s;
    }

    .shop-card-fav.active svg {
      stroke: #e74c6f;
      fill: #e74c6f;
    }

    /* ======================================
       LOADING
    ====================================== */
    .shop-loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }

    .shop-loading-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid #e0dbd5;
      border-top-color: var(--blue-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .shop-empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-light);
      font-size: 14px;
    }

    /* ======================================
       RECENTLY VIEWED
    ====================================== */
    .rv-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 8px;
    }

    .rv-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
      letter-spacing: 0.02em;
    }

    .rv-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 12px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .rv-scroll::-webkit-scrollbar { display: none; }

    .rv-card {
      flex: 0 0 140px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: opacity 0.2s;
    }

    .rv-card:hover { opacity: 0.8; }

    .rv-card-img {
      width: 140px;
      height: 140px;
      border-radius: var(--radius);
      overflow: hidden;
      background: #eee;
      position: relative;
    }

    .rv-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .rv-card-sold {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
    }

    .rv-card-brand {
      font-size: 10px;
      color: var(--text-light);
      margin-top: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rv-card-name {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .rv-card-price {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-top: 2px;
    }

    /* ======================================
       FOOTER
    ====================================== */
    .shop-footer {
      background: var(--text-primary);
      color: rgba(255,255,255,0.5);
      text-align: center;
      padding: 32px 20px;
      font-size: 11px;
      letter-spacing: 1px;
    }

    .shop-footer-logo {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 3px;
      margin-bottom: 8px;
    }

    .shop-footer-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 16px;
    }

    .shop-footer-links a {
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      font-size: 11px;
      transition: color 0.2s;
    }

    .shop-footer-links a:hover {
      color: rgba(255,255,255,0.8);
    }

    /* ======================================
       RESPONSIVE
    ====================================== */
    @media (max-width: 768px) {
      .shop-header-inner { height: 56px; }
      .shop-logo-text { font-size: 18px; }
      .shop-nav a.nav-text { display: none; }
      .shop-hero { padding: 32px 16px 16px; }
      .shop-hero-catch { font-size: 22px; }
      .shop-grid {
        columns: 2;
        column-gap: 10px;
        padding: 12px 12px 60px;
      }
      .shop-card { margin-bottom: 10px; }
      .shop-card-info { padding: 8px 10px 12px; }
      .shop-card-name { font-size: 12px; }
      .shop-card-price-tag { font-size: 13px; padding: 3px 10px; }
      .shop-filter-bar { padding: 12px 12px 4px; }
    }

    @media (max-width: 480px) {
      .shop-hero-catch { font-size: 19px; }
      .shop-badge-sold { font-size: 16px; padding: 3px 14px; }
    }

    /* ======================================
       MOBILE MENU
    ====================================== */
    .shop-mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--text-secondary);
    }

    @media (max-width: 768px) {
      .shop-mobile-menu-btn { display: block; }
    }

    /* Scroll to top */
    .shop-scroll-top {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      background: var(--blue-primary);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      box-shadow: var(--shadow-md);
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
      z-index: 50;
    }

    .shop-scroll-top.visible {
      opacity: 1;
      visibility: visible;
    }

    /* ======================================
       SEARCH & SORT BAR
    ====================================== */
    .shop-search-sort {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .shop-search-wrap {
      flex: 1;
      position: relative;
    }

    .shop-search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-light);
      pointer-events: none;
    }

    .shop-search-input {
      width: 100%;
      padding: 9px 12px 9px 36px;
      border: 1px solid #D5D0CA;
      border-radius: 20px;
      background: var(--bg-card);
      font-size: 16px;
      font-family: inherit;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s;
    }

    .shop-search-input::placeholder {
      color: var(--text-light);
      font-weight: 300;
    }

    .shop-search-input:focus {
      border-color: var(--blue-primary);
    }

    .shop-search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-light);
      font-size: 16px;
      cursor: pointer;
      display: none;
      padding: 2px 4px;
    }

    .shop-search-clear.visible { display: block; }

    .shop-sort-select {
      padding: 9px 32px 9px 12px;
      border: 1px solid #D5D0CA;
      border-radius: 20px;
      background: var(--bg-card);
      font-size: 12px;
      font-family: inherit;
      color: var(--text-secondary);
      outline: none;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%239B9590' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 12px center;
      white-space: nowrap;
      transition: border-color 0.2s;
    }

    .shop-sort-select:focus { border-color: var(--blue-primary); }

    @media (max-width: 768px) {
      .shop-search-sort { padding: 0 12px 4px; }
      .shop-sort-select { padding: 8px 28px 8px 10px; font-size: 11px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="shop-header">
    <div class="shop-header-inner">
      <a href="/shop/" class="shop-logo">
        <div>
          <div class="shop-logo-text">FURIRA</div>
          <div class="shop-logo-sub">vintage & used</div>
        </div>
      </a>
      <nav class="shop-nav">
        <a href="/shop/" class="nav-text" style="color: var(--blue-primary);">Shop</a>
        <a href="#about" class="nav-text">About</a>
        <button class="shop-nav-icon" onclick="location.href='/shop/favorites.html'" aria-label="お気に入り">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
          </svg>
        </button>
        <button class="shop-nav-icon" onclick="location.href='/shop/cart.html'" aria-label="Cart">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"></path>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <path d="M16 10a4 4 0 01-8 0"></path>
          </svg>
          <span class="cart-badge" id="cartBadge">0</span>
        </button>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <section class="shop-hero">
    <h1 class="shop-hero-catch">Find Your Next Favorite</h1>
    <p class="shop-hero-sub">一点ものの古着・ヴィンテージアイテムをあなたに</p>
    <div class="shop-hero-line"></div>
  </section>

  <!-- FILTER BAR -->
  <div class="shop-filter-bar">
    <div class="shop-filter-tags">
      <button class="shop-filter-tag active" data-filter="all">すべて</button>
      <button class="shop-filter-tag" data-filter="tops">トップス</button>
      <button class="shop-filter-tag" data-filter="bottoms">ボトムス</button>
      <button class="shop-filter-tag" data-filter="outerwear">アウター</button>
      <button class="shop-filter-tag" data-filter="accessories">小物・その他</button>
    </div>
    <span class="shop-item-count" id="shopItemCount"></span>
  </div>

  <!-- SEARCH & SORT -->
  <div class="shop-search-sort">
    <div class="shop-search-wrap">
      <svg class="shop-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" class="shop-search-input" id="shopSearchInput" placeholder="ブランド名・商品名で検索...">
      <button class="shop-search-clear" id="shopSearchClear" onclick="shopClearSearch()">&times;</button>
    </div>
    <select class="shop-sort-select" id="shopSortSelect" onchange="shopApplySort()">
      <option value="default">おすすめ順</option>
      <option value="newest">新着順</option>
      <option value="price-low">価格が安い順</option>
      <option value="price-high">価格が高い順</option>
      <option value="brand">ブランド順</option>
    </select>
  </div>

  <!-- PRODUCT GRID -->
  <div class="shop-grid" id="shopGrid">
    <div class="shop-loading" id="shopLoading">
      <div class="shop-loading-spinner"></div>
      <div>読み込み中...</div>
    </div>
  </div>

  <!-- RECENTLY VIEWED -->
  <div class="rv-section" id="rvSection" style="display: none;">
    <div class="rv-title">最近見た商品</div>
    <div class="rv-scroll" id="rvScroll"></div>
  </div>

  <!-- FOOTER -->
  <footer class="shop-footer">
    <div class="shop-footer-logo">FURIRA</div>
    <div class="shop-footer-links">
      <a href="/shop/">Shop</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </div>
    <div>&copy; 2026 FURIRA. All rights reserved.</div>
  </footer>

  <!-- Scroll to top -->
  <button class="shop-scroll-top" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Scroll to top">&#8593;</button>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="/shop/cart-utils.js"></script>
  <script src="/shop/favorites-utils.js"></script>
  <script src="/shop/recently-viewed-utils.js"></script>

  <script>
    // ============================================
    // Firebase Init
    // ============================================
    firebase.initializeApp({
      apiKey: "AIzaSyCe-mj6xoV1HbHkIOVqeHCjKjwwtCorUZQ",
      authDomain: "furira.jp",
      projectId: "reborn-chat",
      storageBucket: "reborn-chat.firebasestorage.app",
      messagingSenderId: "345706548795",
      appId: "1:345706548795:web:058a553da6b4b74db5161e"
    });
    var db = firebase.firestore();

    // ============================================
    // State
    // ============================================
    var shopProducts = [];
    var shopCurrentFilter = 'all';
    var shopSearchQuery = '';
    var shopCurrentSort = 'default';

    // ============================================
    // Category Mapping
    // ============================================
    var categoryFilterMap = {
      'tops': ['トップス', 'Tシャツ', 'シャツ', 'ブラウス', 'ニット', 'セーター', 'パーカー', 'スウェット', 'カーディガン', 'ポロシャツ', 'タンクトップ', 'ベスト'],
      'bottoms': ['パンツ', 'ズボン', 'デニム', 'ジーンズ', 'スカート', 'ショートパンツ', 'スラックス', 'チノパン', 'カーゴパンツ', 'ワイドパンツ'],
      'outerwear': ['ジャケット', 'アウター', 'コート', 'ブルゾン', 'ダウン', 'ライダース', 'Gジャン', 'デニムジャケット', 'マウンテンパーカー', 'ウインドブレーカー'],
      'accessories': ['バッグ', 'カバン', '帽子', 'キャップ', 'ハット', 'マフラー', 'ストール', 'ベルト', 'アクセサリー', '財布', '靴', 'シューズ', 'スニーカー', 'ブーツ']
    };

    // ============================================
    // Fetch Products from Firestore
    // ============================================
    async function shopFetchProducts() {
      try {
        var snapshot = await db.collection('products')
          .limit(200)
          .get();

        shopProducts = [];
        snapshot.forEach(function(doc) {
          var data = doc.data();
          var images = [];
          if (data.images && Array.isArray(data.images) && data.images.length > 0) {
            images = data.images;
          } else if (data.images && data.images.imageUrls && data.images.imageUrls.length > 0) {
            images = data.images.imageUrls;
          } else {
            images = [data.imageUrl1, data.imageUrl2, data.imageUrl3].filter(Boolean);
          }

          // Only show listed + sold products with images
          var status = data.status || '';
          if (status !== '出品中' && status !== '販売済み' && status !== '販売済') return;
          if (images.length === 0) return;

          var listingDate = data.listingDate;
          var listingDateMs = 0;
          if (listingDate) {
            listingDateMs = listingDate.toDate ? listingDate.toDate().getTime() : new Date(listingDate).getTime();
          }

          shopProducts.push({
            id: doc.id,
            name: data.productName || '',
            brand: (typeof data.brand === 'object') ? (data.brand.name || data.brand.label || '') : (data.brand || ''),
            price: data.listingAmount || 0,
            images: images,
            size: (typeof data.size === 'object' && data.size !== null) ? (data.size.display || data.size.actual || data.size.name || data.size.label || '') : (data.size || ''),
            condition: data.condition || '',
            category: data.category || '',
            superCategory: data.superCategory || '',
            categoryMiddle: data.categoryMiddle || '',
            description: data.productDescription || '',
            managementNumber: data.managementNumber || '',
            saleAmount: data.saleAmount || 0,
            status: data.status || '',
            listingDateMs: listingDateMs
          });
        });

        shopRenderProducts();
        shopRenderRecentlyViewed();
      } catch (error) {
        console.error('[Shop] Error fetching products:', error);
        console.error('[Shop] Detail:', error.code, error.message);
        document.getElementById('shopLoading').innerHTML =
          '<div style="color: var(--sold-red);">Failed to load products<br><small>' + (error.message || '') + '</small></div>';
      }
    }

    // ============================================
    // Filter Products
    // ============================================
    function shopGetFilteredProducts() {
      var result = shopProducts;

      // Category filter
      if (shopCurrentFilter !== 'all') {
        var keywords = categoryFilterMap[shopCurrentFilter] || [];
        result = result.filter(function(p) {
          var cats = (p.superCategory + ' ' + p.category + ' ' + p.categoryMiddle).toLowerCase();
          return keywords.some(function(kw) {
            return cats.indexOf(kw.toLowerCase()) !== -1;
          });
        });
      }

      // Search filter
      if (shopSearchQuery) {
        var q = shopSearchQuery.toLowerCase();
        result = result.filter(function(p) {
          return (p.name.toLowerCase().indexOf(q) !== -1) ||
                 (p.brand.toLowerCase().indexOf(q) !== -1) ||
                 (p.category.toLowerCase().indexOf(q) !== -1) ||
                 (p.managementNumber.toLowerCase().indexOf(q) !== -1);
        });
      }

      // Sort
      result = shopSortProducts(result);

      return result;
    }

    function shopSortProducts(products) {
      var sorted = products.slice();
      switch (shopCurrentSort) {
        case 'newest':
          sorted.sort(function(a, b) { return (b.listingDateMs || 0) - (a.listingDateMs || 0); });
          break;
        case 'price-low':
          sorted.sort(function(a, b) { return (a.price || a.saleAmount || 0) - (b.price || b.saleAmount || 0); });
          break;
        case 'price-high':
          sorted.sort(function(a, b) { return (b.price || b.saleAmount || 0) - (a.price || a.saleAmount || 0); });
          break;
        case 'brand':
          sorted.sort(function(a, b) { return a.brand.localeCompare(b.brand); });
          break;
        default:
          // Default: listed first, then sold; within each group by date desc
          sorted.sort(function(a, b) {
            var aIsSold = (a.status === '販売済み' || a.status === '販売済') ? 1 : 0;
            var bIsSold = (b.status === '販売済み' || b.status === '販売済') ? 1 : 0;
            if (aIsSold !== bIsSold) return aIsSold - bIsSold;
            return (b.listingDateMs || 0) - (a.listingDateMs || 0);
          });
          break;
      }
      return sorted;
    }

    // ============================================
    // Render Products
    // ============================================
    function shopRenderProducts() {
      var grid = document.getElementById('shopGrid');
      var filtered = shopGetFilteredProducts();

      // Update count
      var countEl = document.getElementById('shopItemCount');
      if (countEl) countEl.textContent = filtered.length + ' 件';

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="shop-empty">商品が見つかりませんでした</div>';
        return;
      }

      var html = '';
      filtered.forEach(function(product) {
        var isNew = shopIsNewProduct(product);
        var isSold = product.status === '販売済み' || product.status === '販売済';

        html += '<div class="shop-card" onclick="shopViewProduct(\'' + product.id + '\')">';
        html += '<div class="shop-card-img-wrap">';
        var imgSrc = (product.images.length > 0) ? product.images[0] : '';
        if (!imgSrc) return; // skip rendering cards without images
        html += '<img src="' + imgSrc + '" alt="' + shopEscape(product.name) + '" loading="lazy" onerror="this.parentElement.parentElement.style.display=\'none\'">';
        if (isNew && !isSold) html += '<div class="shop-badge-new">New</div>';
        if (isSold) html += '<div class="shop-badge-sold">Sold</div>';
        var isFav = FuriraFavorites.has(product.id);
        html += '<button class="shop-card-fav' + (isFav ? ' active' : '') + '" onclick="event.stopPropagation(); shopToggleFav(this, \'' + product.id + '\')" aria-label="お気に入り"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></button>';
        html += '</div>';
        html += '<div class="shop-card-info">';
        if (product.brand) html += '<div class="shop-card-brand">' + shopEscape(product.brand) + '</div>';
        html += '<div class="shop-card-name">' + shopEscape(product.name) + '</div>';
        html += '<div>';
        var displayPrice = product.price || product.saleAmount || 0;
        if (displayPrice > 0) {
          html += '<span class="shop-card-price-tag">&yen;' + shopFormatPrice(displayPrice) + '</span>';
        }
        if (product.size) html += '<span class="shop-card-size">' + shopEscape(product.size) + '</span>';
        html += '</div>';
        html += '</div>';
        html += '</div>';
      });

      grid.innerHTML = html;
    }

    // ============================================
    // Helpers
    // ============================================
    function shopIsNewProduct(product) {
      if (!product.listingDateMs) return false;
      var sevenDaysMs = 7 * 24 * 60 * 60 * 1000;
      return (Date.now() - product.listingDateMs) < sevenDaysMs;
    }

    function shopFormatPrice(price) {
      return Number(price || 0).toLocaleString();
    }

    function shopEscape(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function shopViewProduct(productId) {
      window.location.href = '/shop/item.html?id=' + encodeURIComponent(productId);
    }

    // ============================================
    // Filter Click Handlers
    // ============================================
    document.querySelectorAll('.shop-filter-tag').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.shop-filter-tag').forEach(function(b) { b.classList.remove('active'); });
        this.classList.add('active');
        shopCurrentFilter = this.dataset.filter;
        shopRenderProducts();
      });
    });

    // ============================================
    // Search Handler
    // ============================================
    (function() {
      var searchInput = document.getElementById('shopSearchInput');
      var clearBtn = document.getElementById('shopSearchClear');
      var debounceTimer = null;

      searchInput.addEventListener('input', function() {
        clearTimeout(debounceTimer);
        var val = this.value;
        clearBtn.classList.toggle('visible', val.length > 0);
        debounceTimer = setTimeout(function() {
          shopSearchQuery = val.trim();
          shopRenderProducts();
        }, 200);
      });
    })();

    function shopClearSearch() {
      document.getElementById('shopSearchInput').value = '';
      document.getElementById('shopSearchClear').classList.remove('visible');
      shopSearchQuery = '';
      shopRenderProducts();
    }

    function shopApplySort() {
      shopCurrentSort = document.getElementById('shopSortSelect').value;
      shopRenderProducts();
    }

    // ============================================
    // Favorites
    // ============================================
    function shopToggleFav(btn, productId) {
      var added = FuriraFavorites.toggle(productId);
      btn.classList.toggle('active', added);
    }

    // ============================================
    // Scroll to top button
    // ============================================
    window.addEventListener('scroll', function() {
      var btn = document.getElementById('scrollTopBtn');
      if (window.scrollY > 400) btn.classList.add('visible');
      else btn.classList.remove('visible');
    });

    // ============================================
    // Recently Viewed (uses already-fetched shopProducts)
    // ============================================
    function shopRenderRecentlyViewed() {
      var ids = FuriraRecentlyViewed.getExcluding(null, 10);
      if (ids.length === 0) return;

      var html = '';
      var loaded = 0;
      ids.forEach(function(id) {
        var p = shopProducts.find(function(prod) { return prod.id === id; });
        if (!p) return;

        var isSold = p.status === '販売済み' || p.status === '販売済';
        html += '<a class="rv-card" href="/shop/item.html?id=' + encodeURIComponent(p.id) + '">';
        html += '<div class="rv-card-img">';
        html += '<img src="' + p.images[0] + '" alt="' + shopEscape(p.name) + '" loading="lazy">';
        if (isSold) html += '<div class="rv-card-sold">Sold</div>';
        html += '</div>';
        if (p.brand) html += '<div class="rv-card-brand">' + shopEscape(p.brand) + '</div>';
        html += '<div class="rv-card-name">' + shopEscape(p.name) + '</div>';
        var price = p.price || p.saleAmount || 0;
        if (price > 0) html += '<div class="rv-card-price">&yen;' + shopFormatPrice(price) + '</div>';
        html += '</a>';
        loaded++;
      });

      if (loaded > 0) {
        document.getElementById('rvScroll').innerHTML = html;
        document.getElementById('rvSection').style.display = '';
      }
    }

    // ============================================
    // Init
    // ============================================
    FuriraCart.updateBadge();
    shopFetchProducts();
  </script>
</body>
</html>
