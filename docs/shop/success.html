<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FURIRA - ご注文完了</title>
  <link rel="icon" href="/images/furira-square-logo.png">
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-warm: #F5F2ED;
      --bg-card: #FFFFFF;
      --blue-primary: #4A7FB5;
      --blue-dark: #3A6A9B;
      --craft-brown: #C4956A;
      --craft-light: #E8D5C0;
      --text-primary: #2C2C2C;
      --text-secondary: #6B6560;
      --text-light: #9B9590;
      --new-green: #5B8A5A;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --radius: 4px;
    }

    body {
      font-family: 'Noto Sans JP', 'Inter', sans-serif;
      background: var(--bg-warm);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .shop-header {
      background: var(--bg-card);
      border-bottom: 1px solid rgba(0,0,0,0.06);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .shop-header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .shop-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text-primary);
    }

    .shop-logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--blue-primary);
    }

    .shop-logo-sub {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--text-light);
      text-transform: uppercase;
      margin-top: -2px;
    }

    .success-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 60px 20px 80px;
      text-align: center;
    }

    .success-check {
      width: 72px;
      height: 72px;
      background: var(--new-green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: scaleIn 0.4s ease;
    }

    @keyframes scaleIn {
      0% { transform: scale(0); }
      60% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .success-check svg {
      width: 36px;
      height: 36px;
      stroke: white;
      stroke-width: 3;
      fill: none;
    }

    .success-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .success-message {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 32px;
      line-height: 1.8;
    }

    .success-order-box {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 32px;
      text-align: left;
    }

    .success-order-label {
      font-size: 12px;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .success-order-id {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      font-family: 'Inter', monospace;
      letter-spacing: 0.5px;
      word-break: break-all;
    }

    .success-note {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 12px;
      line-height: 1.6;
    }

    .success-btn {
      display: inline-block;
      padding: 14px 40px;
      background: var(--blue-primary);
      color: white;
      text-decoration: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .success-btn:hover { background: var(--blue-dark); }

    .shop-footer {
      background: var(--text-primary);
      color: rgba(255,255,255,0.5);
      text-align: center;
      padding: 32px 20px;
      font-size: 11px;
      letter-spacing: 1px;
    }

    .shop-footer-logo {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 3px;
      margin-bottom: 8px;
    }

    @media (max-width: 768px) {
      .shop-header-inner { height: 56px; }
      .shop-logo-text { font-size: 18px; }
      .success-container { padding: 40px 16px 60px; }
      .success-title { font-size: 19px; }
    }

    @media (max-width: 480px) {
      .success-container { padding: 32px 12px 48px; }
      .success-check { width: 56px; height: 56px; }
      .success-check svg { width: 28px; height: 28px; }
      .success-title { font-size: 17px; }
      .success-order-box { padding: 16px; }
      .success-order-id { font-size: 14px; }
      .success-btn { padding: 12px 32px; font-size: 13px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="shop-header">
    <div class="shop-header-inner">
      <a href="/shop/" class="shop-logo">
        <div>
          <div class="shop-logo-text">FURIRA</div>
          <div class="shop-logo-sub">vintage & used</div>
        </div>
      </a>
    </div>
  </header>

  <!-- SUCCESS CONTENT -->
  <div class="success-container">
    <div class="success-check">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>

    <h1 class="success-title">ご注文ありがとうございます</h1>
    <p class="success-message">
      ご注文を承りました。<br>
      商品の発送準備が整い次第、メールでお知らせいたします。
    </p>

    <div class="success-order-box">
      <div class="success-order-label">注文番号</div>
      <div class="success-order-id" id="orderId">読み込み中...</div>
      <div class="success-note">
        ※ この注文番号はお問い合わせの際に必要になります。<br>
        ※ 確認メールもお送りしていますのでご確認ください。
      </div>
    </div>

    <a href="/shop/" class="success-btn">ショップに戻る</a>
    <a href="/shop/orders.html" style="display: block; text-align: center; margin-top: 12px; color: #4A7FB5; text-decoration: none; font-size: 13px;">注文履歴を確認する</a>
  </div>

  <!-- FOOTER -->
  <footer class="shop-footer">
    <div class="shop-footer-logo">FURIRA</div>
    <div>&copy; 2026 FURIRA. All rights reserved.</div>
  </footer>

  <script src="/shop/cart-utils.js"></script>
  <script>
    // Clear cart after successful purchase
    FuriraCart.clear();

    // Display session ID as order reference
    var params = new URLSearchParams(window.location.search);
    var sessionId = params.get('session_id');
    var orderIdEl = document.getElementById('orderId');

    if (sessionId) {
      // Show shortened session ID as order reference
      orderIdEl.textContent = sessionId.substring(0, 24).toUpperCase();
    } else {
      orderIdEl.textContent = '-';
    }
  </script>
</body>
</html>
